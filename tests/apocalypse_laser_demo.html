<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCH | Apocalypse Laser FINAL CINEMATIC V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #020202;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        canvas {
            background: #000;
            box-shadow: 0 0 120px rgba(0,0,0,1);
            cursor: crosshair;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 4px;
        }

        .controls {
            position: absolute;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        button {
            padding: 18px 50px;
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            border-radius: 2px;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: white;
            color: black;
            box-shadow: 0 0 60px rgba(255,255,255,0.2);
            border-color: white;
            transform: translateY(-3px) scale(1.05);
            color: #000;
        }

        .hud {
            position: absolute;
            top: 50px;
            text-align: center;
            pointer-events: none;
            width: 100%;
        }

        .hud h1 {
            font-size: 14px;
            letter-spacing: 15px;
            color: rgba(255,255,255,0.15);
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .status {
            font-size: 9px;
            color: #ff3355;
            margin-top: 20px;
            opacity: 0.3;
            letter-spacing: 3px;
            font-weight: 400;
        }

        .hint {
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="hud">
        <h1>Apocalypse Weapon System</h1>
        <div class="status">CORE ENGINE V2.0 • FINAL CINEMATIC AUTHENTICITY</div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button onclick="triggerLaser()">Iniciar Sequência</button>
        <div class="hint">Aperte o botão para sentir o poder.</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth * 0.95;
            canvas.height = window.innerHeight * 0.8;
        }
        window.addEventListener('resize', resize);
        resize();

        // STATE
        let s = {
            player: { x: 180, y: canvas.height / 2 },
            laserState: 'idle',
            laserStateStart: 0,
            laserFlashAlpha: 0,
            laserBeamWidth: 0,
            laserResidualBurnLife: 0,
            laserParticles: [],
            laserArcs: [],
            laserEmbers: [],
            shockwaves: [],
            shake: { x: 0, y: 0 },
            frameCount: 0
        };

        const LASER_COLORS = ["#ff00ff", "#ff3355", "#4f46e5", "#ffffff"];
        const CHARGE_DURATION = 1200;
        const FIRING_DURATION = 1400; 
        const COLLAPSE_DURATION = 2500;

        function triggerLaser() {
            if (s.laserState !== 'idle') return;
            
            s.laserState = 'charge';
            s.laserStateStart = performance.now();
            s.laserFlashAlpha = 0;
            s.laserParticles = [];
            s.laserArcs = [];
            s.laserEmbers = [];
            s.shockwaves = [];
            s.laserResidualBurnLife = 0;

            // Suction Particles
            for(let i = 0; i < 300; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 500 + Math.random() * 700;
                s.laserParticles.push({
                    x: s.player.x + 120 + Math.cos(angle) * dist,
                    y: s.player.y + Math.sin(angle) * dist,
                    targetX: s.player.x + 120,
                    targetY: s.player.y,
                    size: 1 + Math.random() * 5,
                    life: 1,
                    speed: 0.02 + Math.random() * 0.05,
                    color: LASER_COLORS[Math.floor(Math.random() * 4)]
                });
            }
        }

        function update() {
            const now = performance.now();
            s.frameCount++;
            
            const elapsed = now - s.laserStateStart;

            // Logic Transitions
            if (s.laserState === 'charge' && elapsed > CHARGE_DURATION) {
                s.laserState = 'firing';
                s.laserStateStart = now;
                s.laserFlashAlpha = 1.2; 
                s.shake = { x: 45, y: 45 };
                s.shockwaves.push({ x: s.player.x + 120, y: s.player.y, radius: 20, alpha: 1, speed: 25, thickness: 20, color: '#fff' });
            } else if (s.laserState === 'firing' && elapsed > FIRING_DURATION) {
                s.laserState = 'collapse';
                s.laserStateStart = now;
                s.laserFlashAlpha = 1.5; 
                s.laserResidualBurnLife = 1.0;
                s.shake = { x: 75, y: 75 };
                
                const impactX = s.player.x + 1500;
                const impactY = s.player.y;

                s.shockwaves.push({ x: impactX, y: impactY, radius: 15, alpha: 1, speed: 15, thickness: 40, color: '#fb923c' });
                s.shockwaves.push({ x: impactX, y: impactY, radius: 40, alpha: 0.8, speed: 22, thickness: 15, color: '#fff' });

                for(let i = 0; i < 350; i++) {
                    s.laserEmbers.push({
                        x: impactX,
                        y: impactY,
                        vx: (Math.random() - 0.5) * 65,
                        vy: (Math.random() - 0.5) * 65,
                        life: 1.2 + Math.random() * 1.5,
                        size: 2 + Math.random() * 20,
                        color: i % 5 === 0 ? 'rgba(120,120,120,0.6)' : LASER_COLORS[Math.floor(Math.random() * 4)]
                    });
                }
            } else if (s.laserState === 'collapse' && elapsed > COLLAPSE_DURATION) {
                s.laserState = 'idle';
            }

            // Behavioral Updates
            if (s.laserState === 'charge') {
                const p = elapsed / CHARGE_DURATION;
                s.shake.x = (Math.random() - 0.5) * 4 * p;
                s.shake.y = (Math.random() - 0.5) * 4 * p;
                s.laserParticles.forEach(p => {
                    p.x += (p.targetX - p.x) * p.speed;
                    p.y += (p.targetY - p.y) * p.speed;
                    p.life -= 0.006;
                });
                s.laserParticles = s.laserParticles.filter(p => p.life > 0);
            }

            if (s.laserState === 'firing') {
                s.laserBeamWidth = 55 + Math.sin(now * 0.09) * 18 + Math.random() * 12;
                if (Math.random() < 0.18) s.laserFlashAlpha = 0.15 + Math.random() * 0.35;
                s.shake.x = (Math.random() - 0.5) * 35;
                s.shake.y = (Math.random() - 0.5) * 35;
            }

            s.shockwaves.forEach(sw => { sw.radius += sw.speed; sw.alpha *= 0.93; sw.thickness *= 0.96; });
            s.shockwaves = s.shockwaves.filter(sw => sw.alpha > 0.01);

            s.laserEmbers.forEach(e => { 
                e.x += e.vx; e.y += e.vy; 
                e.vx *= 0.97; e.vy *= 0.97;
                e.life -= 0.008; 
            });
            s.laserEmbers = s.laserEmbers.filter(e => e.life > 0);
            
            s.shake.x *= 0.88;
            s.shake.y *= 0.88;
            s.laserFlashAlpha *= 0.90;
        }

        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startX = s.player.x + 120;
            const startY = s.player.y;
            const impactX = startX + 1500;

            // DRAW BACKGROUND BUILD-UP
            if (s.laserState === 'charge') {
                const p = (performance.now() - s.laserStateStart) / CHARGE_DURATION;
                ctx.fillStyle = `rgba(0,0,0,${p * 0.9})`;
                ctx.fillRect(0,0,canvas.width,canvas.height);

                s.laserParticles.forEach(p => {
                    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.shadowBlur = 40; ctx.shadowColor = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                });
                
                const r = 20 + Math.sin(performance.now() * 0.04) * 10 + p * 180;
                const g = ctx.createRadialGradient(startX, startY, 0, startX, startY, r);
                g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#ff00ff'); g.addColorStop(0.7, '#4f46e5'); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(startX, startY, r, 0, Math.PI * 2); ctx.fill();
            }

            ctx.save();
            ctx.translate(s.shake.x, s.shake.y);

            // DRAW LASER PHASE
            if (s.laserState === 'firing') {
                ctx.fillStyle = 'rgba(0,0,0,0.88)';
                ctx.fillRect(-300, -300, canvas.width + 600, canvas.height + 600);

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                
                // UNSTABLE OUTER GLOW
                for(let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    const segments = 10;
                    for(let j=1; j<=segments; j++) {
                        const tx = startX + (impactX - startX) * (j/segments);
                        const ty = startY + (Math.random() - 0.5) * 35;
                        ctx.lineTo(tx, ty);
                    }
                    ctx.strokeStyle = LASER_COLORS[i % 4];
                    ctx.shadowColor = LASER_COLORS[i % 4];
                    ctx.shadowBlur = 50 + i * 60;
                    ctx.globalAlpha = 0.18 - i * 0.03;
                    ctx.lineWidth = s.laserBeamWidth + (i * 90);
                    ctx.stroke();
                }

                // ULTRA HOT THIN CORE
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(impactX, startY);
                ctx.strokeStyle = '#fff';
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 200;
                ctx.lineWidth = 10 + Math.random() * 20;
                ctx.stroke();

                // VIOLENT ENERGY JITTER
                for(let i = 0; i < 6; i++) {
                    ctx.beginPath();
                    ctx.strokeStyle = i % 2 === 0 ? '#fff' : '#00ffff';
                    ctx.lineWidth = 1 + Math.random() * 3;
                    ctx.globalAlpha = 0.85;
                    let x = startX;
                    ctx.moveTo(x, startY);
                    while(x < impactX) {
                        x += 25;
                        let y = startY + Math.sin(x * 0.05 + performance.now() * 0.04 + i) * (25 + Math.random() * 40);
                        ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
                ctx.restore();

                // ── ORIGIN ORB (rounded muzzle flash) ──
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                const orbPulse = 1 + Math.sin(performance.now() * 0.015) * 0.25 + Math.random() * 0.1;
                const orbR = (55 + s.laserBeamWidth * 0.55) * orbPulse;
                const orbG = ctx.createRadialGradient(startX, startY, 0, startX, startY, orbR);
                orbG.addColorStop(0,   'rgba(255,255,255,1)');
                orbG.addColorStop(0.15,'rgba(200,160,255,0.95)');
                orbG.addColorStop(0.4, 'rgba(79,70,229,0.7)');
                orbG.addColorStop(0.75,'rgba(255,0,255,0.3)');
                orbG.addColorStop(1,   'transparent');
                ctx.fillStyle = orbG;
                ctx.beginPath();
                ctx.arc(startX, startY, orbR, 0, Math.PI * 2);
                ctx.fill();
                // hard bright center
                ctx.shadowBlur = 80;
                ctx.shadowColor = '#fff';
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                ctx.arc(startX, startY, 10 + Math.random() * 6, 0, Math.PI * 2);
                ctx.fill();
                // spinning ring around origin
                const angle = performance.now() * 0.004;
                for(let i = 0; i < 3; i++) {
                    const a = angle + (i * Math.PI * 2 / 3);
                    const rx = startX + Math.cos(a) * (orbR * 0.7);
                    const ry = startY + Math.sin(a) * (orbR * 0.28);
                    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,0,255,0.8)' : 'rgba(0,255,255,0.8)';
                    ctx.beginPath();
                    ctx.arc(rx, ry, 4 + Math.random() * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // ── IMPACT ORB (rounded hit point) ──
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                const impPulse = 1 + Math.sin(performance.now() * 0.02 + 1.5) * 0.3 + Math.random() * 0.15;
                const impR = (70 + s.laserBeamWidth * 0.6) * impPulse;
                const impG = ctx.createRadialGradient(impactX, startY, 0, impactX, startY, impR);
                impG.addColorStop(0,   'rgba(255,255,255,1)');
                impG.addColorStop(0.1, 'rgba(255,220,100,0.95)');
                impG.addColorStop(0.35,'rgba(255,51,85,0.75)');
                impG.addColorStop(0.7, 'rgba(79,70,229,0.35)');
                impG.addColorStop(1,   'transparent');
                ctx.fillStyle = impG;
                ctx.beginPath();
                ctx.arc(impactX, startY, impR, 0, Math.PI * 2);
                ctx.fill();
                // bright hot center
                ctx.shadowBlur = 100;
                ctx.shadowColor = '#ffdd55';
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.beginPath();
                ctx.arc(impactX, startY, 12 + Math.random() * 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // ── CONTINUOUS IMPACT RINGS ──
                const ringCount = 3;
                const ringCycle = 600; // ms per ring cycle
                const now2 = performance.now();
                ctx.save();
                for(let i = 0; i < ringCount; i++) {
                    const phase = ((now2 + i * (ringCycle / ringCount)) % ringCycle) / ringCycle;
                    const rr = 60 + phase * 280;
                    const alpha = (1 - phase) * 0.7;
                    ctx.beginPath();
                    ctx.arc(impactX, startY, rr, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,180,80,${alpha})`;
                    ctx.lineWidth = (1 - phase) * 12 + 1;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff3355';
                    ctx.stroke();
                }
                // secondary cyan rings (energy feedback)
                for(let i = 0; i < 2; i++) {
                    const phase = ((now2 + 200 + i * (ringCycle / 2)) % ringCycle) / ringCycle;
                    const rr = 40 + phase * 180;
                    const alpha = (1 - phase) * 0.45;
                    ctx.beginPath();
                    ctx.arc(impactX, startY, rr, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
                    ctx.lineWidth = (1 - phase) * 5 + 1;
                    ctx.stroke();
                }
                ctx.restore();
            }

            // DRAW COLLAPSE PHASE
            if (s.laserState === 'collapse') {
                const p = (performance.now() - s.laserStateStart) / COLLAPSE_DURATION;
                const r = 500 + p * 1500;
                
                // RESIDUAL BEAM (fades out as laser collapses)
                if (p < 0.35) {
                    const beamAlpha = (1 - p / 0.35) * 0.6;
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.globalAlpha = beamAlpha;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(impactX, startY);
                    ctx.strokeStyle = '#ff00ff';
                    ctx.shadowColor = '#ff00ff';
                    ctx.shadowBlur = 120;
                    ctx.lineWidth = 8 + Math.random() * 10;
                    ctx.stroke();
                    ctx.globalAlpha = beamAlpha * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(impactX, startY);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.restore();
                }

                // THERMAL IMPACT GLOW
                const g = ctx.createRadialGradient(impactX, startY, 50, impactX, startY, r);
                g.addColorStop(0, "#fff");
                g.addColorStop(0.2, "#ff3355");
                g.addColorStop(0.5, "#ef4444");
                g.addColorStop(1, "transparent");
                ctx.save();
                ctx.globalAlpha = (1 - p) * 0.9;
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(impactX, startY, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // MASSIVE PERSISTENT BURN MARK
                if (s.laserResidualBurnLife > 0) {
                    ctx.save();
                    const bAlpha = s.laserResidualBurnLife * 0.8;
                    ctx.globalAlpha = bAlpha;
                    const burnSize = 750 * (1 + (1 - s.laserResidualBurnLife) * 0.6);
                    const bg = ctx.createRadialGradient(impactX, startY, 120, impactX, startY, burnSize);
                    bg.addColorStop(0, "rgba(255,255,255,1.0)");
                    bg.addColorStop(0.1, "rgba(255,150,0,0.9)");
                    bg.addColorStop(0.4, "rgba(120,0,0,0.6)");
                    bg.addColorStop(1, "transparent");
                    ctx.fillStyle = bg;
                    ctx.beginPath();
                    ctx.arc(impactX, startY, burnSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    s.laserResidualBurnLife -= 0.0025;
                }

                // COLLAPSE IMPACT RINGS (expanding after shot ends)
                ctx.save();
                const numCollapseRings = 5;
                for(let i = 0; i < numCollapseRings; i++) {
                    const delay = i * 0.12;
                    const rp = Math.max(0, (p - delay) / (1 - delay));
                    if(rp <= 0) continue;
                    const rr = 80 + rp * (600 + i * 150);
                    const alpha = (1 - rp) * (0.8 - i * 0.12);
                    if(alpha <= 0) continue;
                    const colors = ['255,255,255','255,180,60','255,51,85','79,70,229','0,200,255'];
                    ctx.beginPath();
                    ctx.arc(impactX, startY, rr, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(${colors[i % colors.length]},${alpha})`;
                    ctx.lineWidth = (1 - rp) * 20 + 2;
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = `rgba(${colors[i % colors.length]},0.8)`;
                    ctx.stroke();
                }
                ctx.restore();
            }

            // DRAW SHOCKWAVES
            s.shockwaves.forEach(sw => {
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                ctx.strokeStyle = sw.color === '#fff' ? `rgba(255,255,255,${sw.alpha})` : `rgba(251,146,60,${sw.alpha})`;
                ctx.lineWidth = sw.thickness;
                ctx.stroke();
            });

            // DRAW DEBRIS & SMOKE
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            s.laserEmbers.forEach(e => {
                ctx.beginPath();
                ctx.globalAlpha = e.life;
                ctx.fillStyle = e.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = e.color;
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();

            // SCREEN FLASH
            if (s.laserFlashAlpha > 0.01) {
                ctx.save();
                ctx.fillStyle = `rgba(255,255,255,${s.laserFlashAlpha})`;
                ctx.fillRect(-400, -400, canvas.width + 800, canvas.height + 800);
                ctx.restore();
            }

            ctx.restore();

            requestAnimationFrame(() => {
                update();
                render();
            });
        }

        render();
    </script>
</body>
</html>
