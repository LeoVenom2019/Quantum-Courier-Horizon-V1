<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythic Eclipse - APOCALYPTIC MEGA LASER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
            font-family: 'Orbitron', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 40px;
            left: 40px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 0.5em;
            background: linear-gradient(to right, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.8));
        }

        .btn-trigger {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 25px 60px;
            background: rgba(217, 70, 239, 0.1);
            border: 2px solid #d946ef;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            z-index: 20;
        }

        .btn-trigger:hover {
            background: rgba(217, 70, 239, 0.3);
            box-shadow: 0 0 40px rgba(217, 70, 239, 0.6);
            transform: translateX(-50%) scale(1.1);
            letter-spacing: 0.5em;
        }

        .btn-trigger:active {
            transform: translateX(-50%) scale(0.9);
        }

        .hint {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: rgba(217, 70, 239, 0.5);
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>MYTHIC ECLIPSE</h1>
        <p style="letter-spacing: 0.2em; color: #d946ef; opacity: 0.8;">[ SYSTEM STATUS: APOCALYPTIC BEAM READY ]</p>
    </div>

    <button class="btn-trigger" id="laserBtn">ENGAGE OMEGA BEAM</button>
    <div class="hint">HIGH INTENSITY ENERGY - OPTICAL DISTORTION DETECTED</div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const laserBtn = document.getElementById('laserBtn');

        let width, height;
        let particles = [];
        let damageNumbers = [];
        let specialEnergyBalls = [];
        let shockwaves = [];
        let laserActiveUntil = 0;
        let lastTime = Date.now();
        let shake = { x: 0, y: 0 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        laserBtn.addEventListener('click', () => {
            const now = Date.now();
            laserActiveUntil = now + 3000; 
            laserBtn.style.opacity = '0.2';
            laserBtn.style.pointerEvents = 'none';
            setTimeout(() => {
                laserBtn.style.opacity = '1';
                laserBtn.style.pointerEvents = 'auto';
            }, 7000);
        });

        function createDamageNumber(x, y, value, isLaser = false) {
            damageNumbers.push({
                x, y,
                value: Math.floor(value),
                life: 1.0,
                color: isLaser ? '#fcd34d' : '#22d3ee',
                isLaser
            });
        }

        function createShockwave(x, y) {
            shockwaves.push({
                x, y,
                radius: 10,
                alpha: 1.0,
                speed: 15
            });
        }

        function loop() {
            const now = Date.now();
            const deltaTime = (now - lastTime) / 16.66;
            lastTime = now;

            const isSpecialActive = now < laserActiveUntil;

            // 3. TREMOR DE CÂMERA (ABSURDAMENTE IMPORTANTE)
            if (isSpecialActive) {
                shake.x = (Math.random() - 0.5) * 12;
                shake.y = (Math.random() - 0.5) * 12;
            } else {
                shake.x *= 0.8;
                shake.y *= 0.8;
            }

            ctx.save();
            ctx.translate(shake.x, shake.y);

            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, width, height);

            // 9. REAÇÃO DO FUNDO
            if (isSpecialActive) {
                ctx.fillStyle = 'rgba(217, 70, 239, 0.05)';
                ctx.fillRect(0, 0, width, height);
            }

            // Estrelas
            ctx.fillStyle = 'white';
            for(let i=0; i<80; i++) {
                const x = (Math.sin(i*123) * 0.5 + 0.5) * width;
                const y = (Math.cos(i*456) * 0.5 + 0.5) * height;
                ctx.globalAlpha = Math.random() * 0.4;
                ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1;

            const playerX = 15;
            const playerY = 50;
            const laserY = (playerY / 100) * height;
            const laserStartX = (playerX / 100) * width + 60;
            const laserEndX = width * 0.95;

            if (isSpecialActive) {
                const beamLife = (laserActiveUntil - now) / 3000;

                // 2. DISTORÇÃO DE CALOR
                ctx.save();
                ctx.globalAlpha = 0.12;
                for (let i = 0; i < 35; i++) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.08})`;
                    const hx = laserStartX + Math.random() * (laserEndX - laserStartX);
                    const distortion = Math.sin(now / 30 + hx * 0.02) * 6;
                    ctx.fillRect(hx, laserY - 80 + Math.random() * 160 + distortion, 3, 3);
                }
                ctx.restore();

                // 7. CHROMATIC ABERRATION FAKE
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)';
                ctx.lineWidth = 40;
                ctx.beginPath(); ctx.moveTo(laserStartX, laserY - 4); ctx.lineTo(laserEndX, laserY - 4); ctx.stroke();
                
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
                ctx.beginPath(); ctx.moveTo(laserStartX, laserY + 4); ctx.lineTo(laserEndX, laserY + 4); ctx.stroke();
                ctx.restore();

                // 1. ADICIONE BLOOM FALSO (ESSENCIAL)
                ctx.save();
                for (let i = 0; i < 6; i++) {
                    ctx.strokeStyle = `rgba(217, 70, 239, ${0.08 - i * 0.012})`;
                    ctx.lineWidth = 100 - i * 15;
                    ctx.shadowBlur = 40 + i * 25;
                    ctx.shadowColor = '#d946ef';
                    ctx.beginPath(); ctx.moveTo(laserStartX, laserY); ctx.lineTo(laserEndX, laserY); ctx.stroke();
                }

                // 5. FAÇA O LASER "RESPIRAR"
                const pulseWidth = 28 + Math.sin(now * 0.03) * 8 + Math.sin(now * 0.12) * 4;
                ctx.strokeStyle = '#d946ef';
                ctx.lineWidth = pulseWidth;
                ctx.stroke();

                // HOT CORE
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = pulseWidth * 0.4;
                ctx.shadowBlur = 50;
                ctx.shadowColor = '#fff';
                ctx.beginPath(); ctx.moveTo(laserStartX, laserY); ctx.lineTo(laserEndX, laserY); ctx.stroke();
                ctx.restore();

                // Lightning caótico
                ctx.save();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.7;
                ctx.beginPath();
                let lx = laserStartX; let ly = laserY; ctx.moveTo(lx, ly);
                while (lx < laserEndX) {
                    lx += 10 + Math.random() * 30;
                    ly = laserY + (Math.random() - 0.5) * pulseWidth * 1.5;
                    ctx.lineTo(lx, ly);
                }
                ctx.stroke();
                ctx.restore();

                // 6. TRAILS DE ENERGIA
                if (now % 2 === 0) {
                    for (let i = 0; i < 3; i++) {
                        particles.push({
                            x: laserStartX + Math.random() * (laserEndX - laserStartX),
                            y: laserY + (Math.random() - 0.5) * 60,
                            vx: -12 - Math.random() * 12,
                            vy: (Math.random() - 0.5) * 4,
                            life: 0.8,
                            size: 2 + Math.random() * 5,
                            color: Math.random() > 0.5 ? '#fff' : '#d946ef',
                            type: 'energy'
                        });
                    }
                }

                // Damage Simulation
                if (now % 6 === 0) {
                    createDamageNumber(laserEndX / width * 100, playerY + (Math.random() - 0.5) * 15, 800 + Math.random() * 400, true);
                }

                // End of beam logic
                if (laserActiveUntil - now < 100 && specialEnergyBalls.length === 0) {
                    specialEnergyBalls.push({ x: laserEndX, y: laserY, life: 3.0, lastTick: now });
                    createShockwave(laserEndX, laserY);
                }
            }

            // Energy Balls (8. O IMPACTO FINAL PRECISA EXPLODIR)
            specialEnergyBalls = specialEnergyBalls.filter(ball => {
                ball.life -= 0.016 * deltaTime;
                const ballX = ball.x;
                const ballY = ball.y;
                const pulse = Math.sin(now / 100) * 15;

                if (now - ball.lastTick >= 800) {
                    ball.lastTick = now;
                    createDamageNumber(ballX / width * 100, ballY / height * 100, 2500, true);
                    createShockwave(ballX, ballY);
                }

                ctx.save();
                // Shockwave cinematográfica
                ctx.beginPath();
                ctx.arc(ballX, ballY, 140 + pulse * 2, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${ball.life * 0.4})`;
                ctx.lineWidth = 12;
                ctx.stroke();

                // Layers
                const colors = ['#22d3ee', '#fb923c', '#ef4444'];
                colors.forEach((color, i) => {
                    ctx.beginPath();
                    ctx.arc(ballX, ballY, (60 - i * 15) + pulse * (0.8 - i * 0.2), 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.globalAlpha = 0.3 + (i * 0.2);
                    ctx.fill();
                    ctx.strokeStyle = color;
                    ctx.globalAlpha = 1;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                });

                // Sparks
                if (now % 5 === 0) {
                    particles.push({
                        x: ballX / width * 100, y: ballY / height * 100,
                        vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20,
                        life: 0.5, size: 3, color: '#fff'
                    });
                }
                ctx.restore();
                return ball.life > 0;
            });

            // Shockwaves
            shockwaves = shockwaves.filter(sw => {
                sw.radius += sw.speed;
                sw.alpha *= 0.94;
                ctx.save();
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${sw.alpha})`;
                ctx.lineWidth = sw.radius * 0.1;
                ctx.stroke();
                ctx.restore();
                return sw.alpha > 0.01;
            });

            // Partículas
            particles = particles.filter(p => {
                p.x += p.vx * 0.15 * deltaTime;
                p.y += p.vy * 0.15 * deltaTime;
                p.life -= 0.02 * deltaTime;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc((p.x / 100) * width, (p.y / 100) * height, p.size, 0, Math.PI*2);
                ctx.fill();
                return p.life > 0;
            });

            // Damage Numbers
            damageNumbers = damageNumbers.filter(dn => {
                dn.y -= 0.4 * deltaTime;
                dn.life -= 0.02 * deltaTime;
                const x = (dn.x / 100) * width;
                const y = (dn.y / 100) * height;
                ctx.save();
                ctx.globalAlpha = dn.life;
                ctx.fillStyle = dn.color;
                let fontSize = dn.isLaser ? '42px' : '20px';
                ctx.font = `bold ${fontSize} Orbitron`;
                ctx.textAlign = 'center';
                ctx.shadowBlur = dn.isLaser ? 30 : 10;
                ctx.shadowColor = dn.color;

                if (dn.isLaser) {
                    ctx.save();
                    const scale = 1 + (1 - dn.life) * 0.8;
                    ctx.scale(scale, scale);
                    ctx.fillText(dn.value.toString(), x / scale, y / scale);
                    ctx.restore();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 3;
                    ctx.strokeText(dn.value.toString(), x, y);
                } else {
                    ctx.fillText(dn.value.toString(), x, y);
                }
                ctx.restore();
                return dn.life > 0;
            });

            // Player Ship
            ctx.save();
            const px = (playerX / 100) * width;
            const py = (playerY / 100) * height;
            ctx.fillStyle = '#a855f7';
            ctx.beginPath(); ctx.moveTo(px - 30, py - 20); ctx.lineTo(px + 50, py); ctx.lineTo(px - 30, py + 20); ctx.closePath();
            ctx.shadowBlur = 30; ctx.shadowColor = '#a855f7'; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            ctx.restore();

            // 4. FLASHES DE EXPOSIÇÃO
            if (isSpecialActive && (laserActiveUntil - now > 2800)) {
                ctx.fillStyle = `rgba(255, 255, 255, ${(laserActiveUntil - now - 2800) / 150})`;
                ctx.fillRect(0, 0, width, height);
            }

            ctx.restore(); // END CAMERA SHAKE

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
