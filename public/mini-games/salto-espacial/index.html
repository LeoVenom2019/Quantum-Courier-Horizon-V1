<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salto Espacial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../shared/arcade-results.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div class="hud-item">
                <span class="label">SCORE</span>
                <span id="score">00000</span>
            </div>
            <div class="hud-item">
                <span class="label">CONTROLS</span>
                <span id="controls-display">WASD / ARROWS</span>
            </div>
            <button id="exit-btn">EXIT</button>
        </div>
        
        <canvas id="gameCanvas" width="960" height="544"></canvas>
        
        <div id="overlay" class="hidden">
            <div class="modal">
                <h1 id="modal-title">GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="restart-btn">RESTART</button>
                    <button id="exit-game-btn">EXIT</button>
                </div>
            </div>
        </div>

        <div id="controls-hint">COLLECT CORES · AVOID WALLS · DO NOT CROSS YOUR TRAIL</div>
    </div>
    <script src="../shared/arcade-results.js"></script>
    <script src="script.js"></script>
</body>
</html>
