<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hellfire Barrage - Horizon Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020617;
      --panel-bg: rgba(9, 9, 11, 0.72);
      --border-color: rgba(251, 146, 60, 0.25);
      --accent-color: #fb923c;
      --cyan-color: #22d3ee;
      --text-color: #f8fafc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image: radial-gradient(circle at 50% 50%, rgba(251, 146, 60, 0.05) 0%, transparent 60%);
    }

    .container {
      width: 100%;
      max-width: 1040px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .header-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: #64748b;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 16px;
      border-radius: 8px;
      background-color: rgba(255,255,255,0.02);
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      color: var(--accent-color);
      border-color: var(--accent-color);
      background-color: rgba(251, 146, 60, 0.05);
    }

    .title-block {
      display: flex;
      flex-direction: column;
    }

    .title-block h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: #ffffff;
    }

    .title-block p {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent-color);
    }

    .simulator-wrapper {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      background-color: #000;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: crosshair;
    }

    .control-panel {
      background-color: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .btn-barrage {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid var(--accent-color);
      background-color: rgba(251, 146, 60, 0.12);
      color: #ffffff;
      cursor: pointer;
      text-shadow: 0 0 8px rgba(251, 146, 60, 0.5);
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(251, 146, 60, 0.1);
    }

    .btn-barrage:hover:not(:disabled) {
      background-color: var(--accent-color);
      color: #000000;
      box-shadow: 0 0 25px rgba(251, 146, 60, 0.4);
      transform: scale(1.02);
    }

    .btn-barrage:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      border-color: rgba(255,255,255,0.1);
      background-color: transparent;
      color: #64748b;
      text-shadow: none;
    }

    .instructions {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.5;
    }

    .instructions strong {
      color: var(--text-color);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
    }

    .audio-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #94a3b8;
      cursor: pointer;
      user-select: none;
    }

    .audio-toggle input {
      display: none;
    }

    .checkbox-box {
      width: 16px;
      height: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .audio-toggle input:checked + .checkbox-box {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(251, 146, 60, 0.4);
    }

    .audio-toggle input:checked + .checkbox-box::after {
      content: '';
      width: 6px;
      height: 6px;
      background-color: #000000;
      border-radius: 1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-nav">
      <div class="title-block">
        <p>Horizon Combat Simulator</p>
        <h1>Hellfire Barrage</h1>
      </div>
      <a href="index.html" class="back-btn">← Voltar ao Codex</a>
    </div>

    <div class="simulator-wrapper">
      <canvas id="barrageCanvas" width="960" height="540"></canvas>
    </div>

    <div class="control-panel">
      <div class="instructions">
        <strong>CONTROLES:</strong> Movimento: <code>W, A, S, D / Setas</code> • 
        Disparo Principal: <code>Espaço / Clique</code> • 
        Especial: <code>E / F</code> • 
        Spawn Drones: <code>Clique no espaço vazio</code><br>
        <strong>OBJETIVO:</strong> Dispare a barragem termal homing contra múltiplos drones de teste!
      </div>
      <div class="audio-toggle-wrapper" style="display: flex; gap: 20px; align-items: center;">
        <label class="audio-toggle">
          <input type="checkbox" id="audioCheckbox" checked>
          <span class="checkbox-box"></span>
          Áudio Sintetizado
        </label>
        <button class="btn-barrage" id="triggerBtn">Lançar Hellfire [F]</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('barrageCanvas');
    const ctx = canvas.getContext('2d');
    const triggerBtn = document.getElementById('triggerBtn');
    const audioCheckbox = document.getElementById('audioCheckbox');

    const WIDTH = 960;
    const HEIGHT = 540;

    // Teclado
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if ([' ', 'q', 'e', 'c', 'f'].includes(e.key.toLowerCase())) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // Sons Sintetizados via Web Audio API
    let audioCtx = null;
    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playSynthShoot() {
      if (!audioCheckbox.checked) return;
      const actx = getAudioContext();
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, actx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, actx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.15);
      osc.connect(gain);
      gain.connect(actx.destination);
      osc.start();
      osc.stop(actx.currentTime + 0.15);
    }

    function synthHellfireLaunch() {
      if (!audioCheckbox.checked) return;
      const actx = getAudioContext();
      
      const osc = actx.createOscillator();
      const noiseGain = actx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, actx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, actx.currentTime + 0.35);

      const filter = actx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 300;

      noiseGain.gain.setValueAtTime(0.35, actx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.35);

      osc.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(actx.destination);
      
      osc.start();
      osc.stop(actx.currentTime + 0.35);

      // Gerador de Sopro do Foguete (Ruído Bandpass)
      const bufferSize = actx.sampleRate * 0.3;
      const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const noise = actx.createBufferSource();
      noise.buffer = buffer;
      const noiseFilter = actx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.setValueAtTime(150, actx.currentTime);
      noiseFilter.frequency.exponentialRampToValueAtTime(40, actx.currentTime + 0.3);
      
      const ng = actx.createGain();
      ng.gain.setValueAtTime(0.4, actx.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
      
      noise.connect(noiseFilter);
      noiseFilter.connect(ng);
      ng.connect(actx.destination);
      
      noise.start();
      noise.stop(actx.currentTime + 0.3);
    }

    function synthExplosion() {
      if (!audioCheckbox.checked) return;
      const actx = getAudioContext();

      // Frequência de Boom Sub-graves
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(120, actx.currentTime);
      osc.frequency.linearRampToValueAtTime(20, actx.currentTime + 0.5);

      const filter = actx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(200, actx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(30, actx.currentTime + 0.5);

      gain.gain.setValueAtTime(0.45, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.5);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(actx.destination);

      osc.start();
      osc.stop(actx.currentTime + 0.5);

      // Explosão de Combustão Ruído Branco
      const bufferSize = actx.sampleRate * 0.7;
      const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const noise = actx.createBufferSource();
      noise.buffer = buffer;
      const noiseFilter = actx.createBiquadFilter();
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.setValueAtTime(350, actx.currentTime);
      noiseFilter.frequency.exponentialRampToValueAtTime(10, actx.currentTime + 0.7);
      
      const ng = actx.createGain();
      ng.gain.setValueAtTime(0.65, actx.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.7);
      
      noise.connect(noiseFilter);
      noiseFilter.connect(ng);
      ng.connect(actx.destination);
      
      noise.start();
      noise.stop(actx.currentTime + 0.7);
    }

    // Entidades do Jogo
    const player = { x: 120, y: HEIGHT / 2, width: 84, height: 50 };
    const projectiles = [];
    const particles = [];
    const targets = [];
    const floatingTexts = [];
    let screenShake = 0;

    // Estado da Habilidade Sequencial de Hellfire
    const hellfireSeq = {
      active: false,
      remaining: 0,
      lastLaunch: 0,
      cooldown: 220
    };

    function spawnDrone(x, y) {
      targets.push({
        id: Math.random(),
        x: x || (650 + Math.random() * 220),
        y: y || (80 + Math.random() * (HEIGHT - 160)),
        hp: 200,
        maxHp: 200,
        radius: 26,
        pulseOffset: Math.random() * 10
      });
    }

    // Clique no canvas para adicionar novos drones ou atirar
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = ((e.clientX - rect.left) / rect.width) * WIDTH;
      const clickY = ((e.clientY - rect.top) / rect.height) * HEIGHT;

      // Se clicar no espaço vazio, adiciona um drone. Caso contrário, atira normal.
      const hitTarget = targets.find(t => {
        const dx = t.x - clickX;
        const dy = t.y - clickY;
        return Math.sqrt(dx * dx + dy * dy) < t.radius + 30;
      });

      if (!hitTarget) {
        spawnDrone(clickX, clickY);
      } else {
        // Atirar normal focado
        playSynthShoot();
        projectiles.push({
          from: 'player',
          x: player.x + 36,
          y: player.y,
          vx: 12,
          vy: (clickY - player.y) / ((clickX - player.x) / 12),
          color: '#ffffff',
          size: 4
        });
      }
    });

    // Iniciar com 4 drones
    for (let i = 0; i < 4; i++) spawnDrone();

    function triggerHellfire() {
      if (hellfireSeq.active) return;
      hellfireSeq.active = true;
      hellfireSeq.remaining = 5;
      hellfireSeq.lastLaunch = 0;
      triggerBtn.disabled = true;
    }

    triggerBtn.addEventListener('click', triggerHellfire);

    function launchHellfireOrb() {
      // Procurar alvos ativos ordenados pela menor distância no eixo X
      const aliveTargets = targets.filter(t => t.hp > 0);
      const target = aliveTargets.sort((a,b) => a.x - b.x)[0];

      const startX = player.x + 20;
      const startY = player.y - 20;
      const targetX = target ? target.x : WIDTH * 0.9;
      const targetY = target ? target.y : player.y;

      const dx = targetX - startX;
      const dy = targetY - startY;
      const len = Math.max(1, Math.sqrt(dx * dx + dy * dy));

      const speed = 7.0;

      synthHellfireLaunch();

      projectiles.push({
        special: 'hellfire',
        targetId: target ? target.id : null,
        x: startX,
        y: startY,
        vx: (dx / len) * speed,
        vy: (dy / len) * speed,
        damage: 180,
        color: '#fb923c',
        size: 9
      });
      screenShake = 3;
    }

    let lastShot = 0;
    function update(now) {
      // Movimento
      const speed = 4.2;
      if (keys.w || keys.arrowup) player.y -= speed;
      if (keys.s || keys.arrowdown) player.y += speed;
      if (keys.a || keys.arrowleft) player.x -= speed;
      if (keys.d || keys.arrowright) player.x += speed;

      player.x = Math.max(50, Math.min(WIDTH * 0.45, player.x));
      player.y = Math.max(45, Math.min(HEIGHT - 45, player.y));

      // Disparo comum [Espaço]
      if (keys[' '] && now - lastShot > 180) {
        playSynthShoot();
        projectiles.push({
          from: 'player',
          x: player.x + 36,
          y: player.y,
          vx: 12,
          vy: 0,
          color: '#ffffff',
          size: 4
        });
        lastShot = now;
      }

      // Habilidade Especial [E / F]
      if (keys.e || keys.f) {
        triggerHellfire();
      }

      // Execução Sequencial de Hellfire
      if (hellfireSeq.active && now - hellfireSeq.lastLaunch > hellfireSeq.cooldown) {
        if (hellfireSeq.remaining > 0) {
          launchHellfireOrb();
          hellfireSeq.remaining--;
          hellfireSeq.lastLaunch = now;
        } else {
          hellfireSeq.active = false;
          triggerBtn.disabled = false;
        }
      }

      // Projéteis (Hellfire Homing Physics + Projéteis Normais)
      projectiles.forEach((proj) => {
        if (proj.special === 'hellfire') {
          // Se tiver alvo fixado e vivo, recalcula a atração dinâmica (Homing Curving)
          if (proj.targetId) {
            const target = targets.find(t => t.id === proj.targetId && t.hp > 0);
            if (target) {
              const dx = target.x - proj.x;
              const dy = target.y - proj.y;
              const len = Math.max(1, Math.sqrt(dx * dx + dy * dy));
              
              const targetVx = (dx / len) * 7.5;
              const targetVy = (dy / len) * 7.5;

              // Curva suave aplicando interpolação linear
              proj.vx = proj.vx * 0.86 + targetVx * 0.14;
              proj.vy = proj.vy * 0.86 + targetVy * 0.14;
            }
          }
          proj.x += proj.vx;
          proj.y += proj.vy;

          // Efeito de cauda de fogo das orbes
          if (Math.random() > 0.3) {
            particles.push({
              x: proj.x - proj.vx,
              y: proj.y - proj.vy,
              vx: (Math.random() - 0.5) * 2 - proj.vx * 0.3,
              vy: (Math.random() - 0.5) * 2 - proj.vy * 0.3,
              life: 25,
              size: 3 + Math.random() * 4,
              color: Math.random() > 0.5 ? '#fb923c' : '#ef4444'
            });
          }

          // Colisão Orbe Homing
          targets.forEach(target => {
            if (target.hp > 0) {
              const dx = target.x - proj.x;
              const dy = target.y - proj.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < target.radius + 10) {
                target.hp -= proj.damage;
                proj.x = WIDTH + 999; // destroy
                screenShake = 10;
                synthExplosion();

                floatingTexts.push({
                  x: target.x,
                  y: target.y - 20,
                  text: 'CRIT 180',
                  life: 35,
                  color: '#fb923c'
                });

                // Anel Explosivo Massivo de Fogo
                for (let i = 0; i < 40; i++) {
                  const angle = Math.random() * Math.PI * 2;
                  const force = 1 + Math.random() * 7;
                  particles.push({
                    x: target.x,
                    y: target.y,
                    vx: Math.cos(angle) * force,
                    vy: Math.sin(angle) * force,
                    life: 35 + Math.random() * 20,
                    size: 2 + Math.random() * 6,
                    color: ['#ff3355', '#fb923c', '#eab308', '#ffffff'][Math.floor(Math.random() * 4)]
                  });
                }
              }
            }
          });

        } else {
          // Projétil Normal
          proj.x += proj.vx;
          proj.y += proj.vy;

          targets.forEach(target => {
            if (target.hp > 0) {
              const dx = target.x - proj.x;
              const dy = target.y - proj.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < target.radius) {
                target.hp -= 25;
                proj.x = WIDTH + 999;
                floatingTexts.push({
                  x: target.x,
                  y: target.y - 20,
                  text: '25',
                  life: 25,
                  color: '#ffffff'
                });
                for(let i=0; i<3; i++) {
                  particles.push({
                    x: proj.x,
                    y: proj.y,
                    vx: -3 - Math.random()*2,
                    vy: (Math.random()-0.5)*3,
                    life: 15,
                    size: 1.5,
                    color: '#e2e8f0'
                  });
                }
              }
            }
          });
        }
      });

      // Limpeza de projéteis
      for (let i = projectiles.length - 1; i >= 0; i--) {
        if (projectiles[i].x > WIDTH + 80 || projectiles[i].x < -80 || projectiles[i].y < -80 || projectiles[i].y > HEIGHT + 80) {
          projectiles.splice(i, 1);
        }
      }

      // Limpeza Drones Mortos
      targets.forEach((t, idx) => {
        if (t.hp <= 0) {
          targets.splice(idx, 1);
          setTimeout(spawnDrone, 2200);
        }
      });

      // Partículas & Textos Flutuantes
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
      });
      for(let i=particles.length-1; i>=0; i--) {
        if(particles[i].life <= 0) particles.splice(i, 1);
      }

      floatingTexts.forEach(ft => {
        ft.y -= 0.6;
        ft.life--;
      });
      for(let i=floatingTexts.length-1; i>=0; i--) {
        if(floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
      }

      if (screenShake > 0) screenShake *= 0.9;
    }

    function draw(now) {
      ctx.save();

      if (screenShake > 0.1) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
      }

      // Background
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Grid Ciberpunk
      ctx.strokeStyle = 'rgba(251, 146, 60, 0.035)';
      ctx.lineWidth = 1;
      for (let x = 0; x < WIDTH; x += 48) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x - 80, HEIGHT);
        ctx.stroke();
      }

      // Drones
      targets.forEach(target => {
        const float = Math.sin(now / 180 + target.pulseOffset) * 5;
        ctx.save();
        ctx.shadowBlur = 18;
        ctx.shadowColor = '#fb923c';
        ctx.fillStyle = '#eab308';
        ctx.beginPath();
        ctx.arc(target.x, target.y + float, target.radius, 0, Math.PI * 2);
        ctx.fill();

        // Barra de Vida
        ctx.fillStyle = '#111827';
        ctx.fillRect(target.x - 24, target.y + float - 36, 48, 4);
        ctx.fillStyle = '#fb923c';
        ctx.fillRect(target.x - 24, target.y + float - 36, 48 * Math.max(0, target.hp / target.maxHp), 4);
        ctx.restore();
      });

      // Partículas
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      // Projéteis
      projectiles.forEach(proj => {
        ctx.save();
        ctx.fillStyle = proj.color;
        ctx.shadowBlur = proj.special === 'hellfire' ? 24 : 10;
        ctx.shadowColor = proj.color;
        ctx.beginPath();
        if (proj.special === 'hellfire') {
          // Desenhar Orbe Gigante Hellfire
          ctx.arc(proj.x, proj.y, proj.size, 0, Math.PI * 2);
          ctx.fill();

          // Núcleo Branco incandescente
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(proj.x, proj.y, proj.size * 0.45, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.roundRect(proj.x, proj.y - 2, 16, 4, 2);
          ctx.fill();
        }
        ctx.restore();
      });

      // Nave do Jogador (Horizon)
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#fb923c';
      ctx.fillStyle = '#fb923c';
      ctx.beginPath();
      ctx.moveTo(player.x + 36, player.y);
      ctx.lineTo(player.x - 30, player.y - 22);
      ctx.lineTo(player.x - 14, player.y);
      ctx.lineTo(player.x - 30, player.y + 22);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Textos flutuantes
      floatingTexts.forEach(ft => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, ft.life / 35);
        ctx.fillStyle = ft.color;
        ctx.font = 'bold 12px monospace';
        ctx.fillText(ft.text, ft.x - 16, ft.y);
        ctx.restore();
      });

      ctx.restore();
    }

    function gameLoop() {
      const now = performance.now();
      update(now);
      draw(now);
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
