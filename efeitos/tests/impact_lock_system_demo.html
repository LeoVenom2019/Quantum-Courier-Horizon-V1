
<style>
canvas { display:block; border-radius:12px; cursor:crosshair; }
#ui { display:flex; gap:10px; align-items:center; margin-top:8px; flex-wrap:wrap; }
.pill { font-size:12px; color:var(--color-text-secondary); background:var(--color-background-secondary); padding:3px 10px; border-radius:20px; border:0.5px solid var(--color-border-tertiary); }
.pill b { color:var(--color-text-primary); font-weight:500; }
#hint { font-size:12px; color:var(--color-text-tertiary); margin-top:5px; }
</style>
<canvas id="c"></canvas>
<div id="ui">
  <div class="pill">Impactos: <b id="hits">0</b></div>
  <div class="pill">Destruídos: <b id="kills">0</b></div>
  <div class="pill">Lock: <b id="lockState">—</b></div>
</div>
<div id="hint">Clique perto de um alvo para guiar · Longe para tiro livre</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
C.width = 680; C.height = 430;
const W = C.width, H = C.height;

let nid = 1, shots = [], particles = [], targets = [], impacts = [];
let hitCount = 0, killCount = 0;
let mouseX = W/2, mouseY = H/2;
let lockTarget = null, lockProgress = 0, lockStartTime = 0;
const LOCK_DURATION = 1800;
const player = { x: 80, y: H/2, cooldown: 0 };

C.addEventListener('mousemove', e => {
  const r = C.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top) * (H / r.height);
});

for (let i = 0; i < 4; i++) spawnTarget();

function spawnTarget() {
  targets.push({
    id: nid++,
    x: 320 + Math.random() * 320,
    y: 40 + Math.random() * 350,
    vx: (Math.random()-0.5) * 0.85,
    vy: (Math.random()-0.5) * 0.55,
    baseAngle: Math.random() * Math.PI * 2,
    angle: 0,
    radius: 22 + Math.random() * 14,
    hp: 100, maxHp: 100,
    flashTimer: 0,
    sinkTimer: -1,
  });
}

function closestTarget(x, y, maxDist) {
  let best = null, bd = maxDist;
  targets.forEach(t => {
    const d = Math.hypot(t.x-x, t.y-y);
    if (d < bd) { bd = d; best = t; }
  });
  return best;
}

C.addEventListener('click', e => {
  if (player.cooldown > 0) return;
  const r = C.getBoundingClientRect();
  const mx = (e.clientX-r.left)*(W/r.width);
  const my = (e.clientY-r.top)*(H/r.height);

  const nearby = closestTarget(mx, my, 100);
  const willGuide = lockTarget && lockProgress >= 0.85;
  const tid = willGuide ? lockTarget.id : null;
  const baseAngle = Math.atan2(my - player.y, mx - player.x);
  const offset = willGuide ? 0 : (Math.random()>0.5?1:-1)*(0.08+Math.random()*0.18);
  const angle = baseAngle + offset;
  const spd = 2.38;

  shots.push({
    id: nid++, from:'player', targetId: tid,
    angle, speed: spd,
    wakeSeed: Math.random()*1000,
    x: player.x + Math.cos(angle)*44,
    y: player.y + Math.sin(angle)*26,
    vx: Math.cos(angle)*spd,
    vy: Math.sin(angle)*spd,
    damage: 45, radius: 7, life: 300,
    trail: [], guideStrength: tid ? 0.038 : 0,
    wobble: 0, wobbleVel: 0,
  });

  player.cooldown = 600;
  spawnLaunchBubbles(player.x + Math.cos(angle)*40, player.y + Math.sin(angle)*24, angle);
});

function spawnLaunchBubbles(x, y, angle) {
  for (let i = 0; i < 20; i++) {
    const a = angle + Math.PI + (Math.random()-0.5)*1.4;
    const s = 0.9 + Math.random()*3.2;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 28+Math.random()*38, maxLife:66, r:1.4+Math.random()*3.2, type:'bubble' });
  }
  particles.push({ x, y, r:4, maxR:55, life:20, maxLife:20, type:'launch_ring' });
}

function spawnImpact(x, y, color, isKill) {
  const burst = isKill ? 3 : 1;
  for (let b = 0; b < burst; b++) {
    const ox = isKill ? (Math.random()-0.5)*30 : 0;
    const oy = isKill ? (Math.random()-0.5)*30 : 0;
    const bx = x + ox, by = y + oy;

    impacts.push({ x:bx, y:by, life:32, maxLife:32, maxR: isKill ? 90 : 65, color });
    impacts.push({ x:bx, y:by, life:22, maxLife:22, maxR: isKill ? 50 : 36, color:'#ffffff', delay: b*4 });

    for (let i = 0; i < (isKill ? 55 : 36); i++) {
      const a = Math.random()*Math.PI*2;
      const s = (isKill ? 2.5 : 1.8) + Math.random()*5.5;
      const isWhite = Math.random() > 0.6;
      particles.push({ x:bx, y:by, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
        life:20+Math.random()*50, maxLife:70, r:0.7+Math.random()*2.8,
        type:'spark', color: isWhite ? '#ffffff' : color });
    }
    for (let i = 0; i < (isKill ? 28 : 16); i++) {
      const a = Math.random()*Math.PI*2;
      const s = 0.4 + Math.random()*2.2;
      particles.push({ x:bx, y:by, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 0.5,
        life:40+Math.random()*65, maxLife:105, r:2.2+Math.random()*5,
        type:'bubble' });
    }
    if (isKill) {
      for (let i = 0; i < 8; i++) {
        const a = Math.random()*Math.PI*2;
        particles.push({ x:bx, y:by, vx:Math.cos(a)*1.4, vy:Math.sin(a)*1.4,
          life:55+Math.random()*55, maxLife:110, r:3+Math.random()*7, type:'debris',
          angle: Math.random()*Math.PI*2, rotVel:(Math.random()-0.5)*0.18 });
      }
    }
  }
}

function drawBg(t) {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#010b18'); g.addColorStop(1,'#021020');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=0.014; ctx.strokeStyle='#7dd3fc'; ctx.lineWidth=0.5;
  for(let i=0;i<10;i++){
    const bx=((i*157+t*0.00007)%1)*W, by=((i*83+t*0.00004)%1)*H;
    ctx.beginPath(); ctx.arc(bx,by,16+Math.sin(t*0.0003+i)*7,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer(t) {
  const {x,y} = player;
  const pulse = 0.72+Math.sin(t*0.002)*0.2;
  ctx.save(); ctx.translate(x,y);
  ctx.beginPath(); ctx.arc(0,0,36+Math.sin(t*0.0025)*3,0,Math.PI*2);
  ctx.strokeStyle=`rgba(34,211,238,${0.05+pulse*0.04})`; ctx.lineWidth=0.7; ctx.stroke();
  const hull = ctx.createLinearGradient(-44,-8,44,8);
  hull.addColorStop(0,'rgba(28,38,56,0.97)');
  hull.addColorStop(0.38,'rgba(96,111,128,0.98)');
  hull.addColorStop(0.72,'rgba(68,82,100,0.97)');
  hull.addColorStop(1,'rgba(12,20,40,0.96)');
  ctx.shadowColor='rgba(125,249,255,0.3)'; ctx.shadowBlur=10;
  ctx.fillStyle=hull; ctx.strokeStyle='rgba(148,163,184,0.65)'; ctx.lineWidth=0.7;
  ctx.beginPath();
  ctx.moveTo(44,0); ctx.quadraticCurveTo(34,-8.5,-30,-8); ctx.lineTo(-44,0);
  ctx.quadraticCurveTo(-30,8,34,8.5); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(68,82,100,0.95)'; ctx.strokeStyle='rgba(148,163,184,0.55)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.roundRect(-5,-16,18,10,3); ctx.fill(); ctx.stroke();
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.arc(-8+i*13,0,2,0,Math.PI*2);
    ctx.fillStyle=`rgba(125,249,255,${0.22*pulse})`; ctx.fill();
  }
  if(player.cooldown>0){
    const pct=player.cooldown/600;
    ctx.fillStyle='rgba(12,20,40,0.7)'; ctx.fillRect(-20,15,40,4);
    ctx.fillStyle=`rgba(34,211,238,${0.65+pulse*0.25})`; ctx.fillRect(-20,15,40*(1-pct),4);
  }
  ctx.restore();
}

function drawTarget(t, now) {
  const {x,y,angle,radius,hp,maxHp,flashTimer,sinkTimer} = t;
  if(sinkTimer>=0) return;
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  const flash = flashTimer>0 ? Math.abs(Math.sin(flashTimer*0.55)) : 0;
  ctx.shadowColor=flash>0.3?'rgba(248,113,113,0.85)':'rgba(248,113,113,0.2)';
  ctx.shadowBlur=6+flash*16;
  const r=radius;
  const hull=ctx.createLinearGradient(-r,-r*0.4,r,r*0.4);
  hull.addColorStop(0,`rgba(65,24,24,${0.92+flash*0.08})`);
  hull.addColorStop(0.38,`rgba(180,60,60,${0.87+flash*0.13})`);
  hull.addColorStop(1,'rgba(28,38,56,0.9)');
  ctx.fillStyle=hull; ctx.strokeStyle=`rgba(254,202,202,${0.38+flash*0.45})`; ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.quadraticCurveTo(r*0.58,-r*0.44,-r*0.58,-r*0.37);
  ctx.lineTo(-r,0); ctx.quadraticCurveTo(-r*0.58,r*0.37,r*0.58,r*0.44); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(12,20,40,0.7)'; ctx.fillRect(-r,r+4,r*2,4);
  const hpPct=hp/maxHp;
  ctx.fillStyle=hpPct>0.5?'rgba(34,197,94,0.82)':hpPct>0.25?'rgba(251,191,36,0.82)':'rgba(239,68,68,0.82)';
  ctx.fillRect(-r,r+4,r*2*hpPct,4);
  ctx.restore();
}

function drawReticle(target, t) {
  const isLocked = lockTarget && lockTarget.id === target.id;
  const isTracked = shots.some(s => s.targetId === target.id);
  if(!isLocked && !isTracked) return;
  const progress = isLocked ? lockProgress : 1;
  const pulse = 0.55+Math.sin(t*0.06)*0.35;
  const outerR = target.radius + 14 + Math.sin(t*0.04)*2.5;
  const innerR = target.radius + 6;

  ctx.save(); ctx.translate(target.x, target.y);

  if(isTracked) {
    ctx.beginPath(); ctx.arc(0,0,outerR+4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(253,224,71,${0.12+pulse*0.08})`; ctx.lineWidth=6; ctx.stroke();
  }

  const arcLen = progress * Math.PI * 2;
  ctx.beginPath();
  ctx.arc(0,0,outerR, -Math.PI/2, -Math.PI/2 + arcLen);
  ctx.strokeStyle=`rgba(253,224,71,${isTracked ? 0.95 : 0.55+pulse*0.35})`;
  ctx.lineWidth= isTracked ? 1.4 : 1;
  ctx.stroke();

  if(isTracked) {
    ctx.beginPath(); ctx.arc(0,0,innerR,0,Math.PI*2);
    ctx.strokeStyle=`rgba(253,224,71,${0.2+pulse*0.15})`; ctx.lineWidth=0.6;
    ctx.setLineDash([2,5]); ctx.stroke(); ctx.setLineDash([]);
  }

  const corners = [0, Math.PI/2, Math.PI, Math.PI*1.5];
  corners.forEach(a => {
    ctx.save(); ctx.rotate(a);
    ctx.strokeStyle=`rgba(253,224,71,${isTracked ? 0.92 : 0.45+pulse*0.4})`;
    ctx.lineWidth= isTracked ? 1.6 : 1;
    ctx.shadowColor='rgba(253,224,71,0.5)'; ctx.shadowBlur= isTracked ? 5 : 2;
    ctx.beginPath();
    ctx.moveTo(outerR,-outerR*0.38); ctx.lineTo(outerR,-outerR);
    ctx.lineTo(outerR*0.38,-outerR); ctx.stroke();
    ctx.restore();
  });

  if(isLocked && progress>=1) {
    ctx.fillStyle=`rgba(253,224,71,${0.7+pulse*0.25})`;
    ctx.font=`500 10px var(--font-sans)`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('LOCK', 0, -outerR-10);
  }

  if(isTracked) {
    ctx.beginPath();
    ctx.moveTo(-6,-outerR-2); ctx.lineTo(0,-outerR+6); ctx.lineTo(6,-outerR-2);
    ctx.fillStyle=`rgba(253,224,71,${0.7+pulse*0.2})`; ctx.fill();
  }

  ctx.restore();
}

function drawGuidanceLine(shot, t) {
  if(!shot.targetId) return;
  const tgt = targets.find(t=>t.id===shot.targetId); if(!tgt) return;
  const pulse = 0.3+Math.sin(t*0.045)*0.2;
  ctx.save();
  ctx.setLineDash([3,9]); ctx.strokeStyle=`rgba(253,224,71,${pulse*0.3})`; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(shot.x,shot.y); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function drawWake(shot, t) {
  const wL=72, wW=11, pulse=0.72+Math.sin(t*0.024+shot.wakeSeed)*0.22;
  ctx.save();
  ctx.translate(shot.x-Math.cos(shot.angle)*13, shot.y-Math.sin(shot.angle)*13);
  ctx.rotate(shot.angle+Math.PI);
  ctx.globalCompositeOperation='screen';
  const wk=ctx.createLinearGradient(0,0,wL,0);
  wk.addColorStop(0,`rgba(224,242,254,${0.24*pulse})`);
  wk.addColorStop(0.22,`rgba(125,249,255,${0.15*pulse})`);
  wk.addColorStop(0.6,`rgba(34,211,238,${0.06*pulse})`);
  wk.addColorStop(1,'rgba(14,165,233,0)');
  ctx.fillStyle=wk;
  ctx.beginPath();
  ctx.moveTo(0,-wW*0.5);
  ctx.bezierCurveTo(wL*0.26,-wW,wL*0.7,-wW*0.54,wL,-wW*0.1);
  ctx.bezierCurveTo(wL*0.66,wW*0.5,wL*0.2,wW*0.88,0,wW*0.5);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=`rgba(224,242,254,${0.13*pulse})`; ctx.lineWidth=0.65;
  for(let i=0;i<5;i++){
    const p=i/4;
    ctx.beginPath();
    ctx.ellipse(10+p*wL*0.74,Math.sin(t*0.015+i*1.5+shot.wakeSeed)*wW*p*0.65,
      (2.2+p*9)*pulse,(0.9+p*2.4)*pulse,Math.sin(t*0.011+i)*0.42,0,Math.PI*1.5);
    ctx.stroke();
  }
  const stk=ctx.createLinearGradient(0,0,wL*0.48,0);
  stk.addColorStop(0,`rgba(255,255,255,${0.3*pulse})`); stk.addColorStop(1,'rgba(255,255,255,0)');
  ctx.strokeStyle=stk; ctx.lineWidth=1.1;
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(wL*0.18,Math.sin(t*0.02+shot.wakeSeed)*1.4,wL*0.38,0,wL*0.48,0);
  ctx.stroke(); ctx.restore();
}

function drawTrail(shot) {
  shot.trail.forEach((p,i) => {
    const a=(i/shot.trail.length)*0.45;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.7*(i/shot.trail.length),0,Math.PI*2);
    ctx.fillStyle=`rgba(125,249,255,${a})`; ctx.fill();
  });
}

function drawTorpedo(shot, t) {
  const len=30, wid=7.5, pulse=0.82+Math.sin(t*0.02+shot.id)*0.13;
  ctx.save(); ctx.translate(shot.x,shot.y); ctx.rotate(shot.angle);
  ctx.shadowColor='rgba(125,249,255,0.65)'; ctx.shadowBlur=10;
  const body=ctx.createLinearGradient(-len*0.5,0,len*0.5,0);
  body.addColorStop(0,'rgba(28,38,56,0.97)');
  body.addColorStop(0.33,'rgba(200,212,224,0.99)');
  body.addColorStop(0.63,'rgba(145,160,182,0.97)');
  body.addColorStop(1,'rgba(12,20,40,0.96)');
  ctx.fillStyle=body; ctx.strokeStyle='rgba(224,242,254,0.82)'; ctx.lineWidth=0.75;
  ctx.beginPath();
  ctx.moveTo(len*0.5,0); ctx.quadraticCurveTo(len*0.3,-wid*0.78,-len*0.28,-wid*0.7);
  ctx.lineTo(-len*0.5,0); ctx.quadraticCurveTo(-len*0.28,wid*0.7,len*0.3,wid*0.78);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle=`rgba(125,249,255,${0.5*pulse})`;
  ctx.beginPath(); ctx.ellipse(len*0.37,0,3.8,wid*0.52,0,0,Math.PI*2); ctx.fill();
  const eg=ctx.createRadialGradient(-len*0.43,0,0,-len*0.43,0,wid*0.78);
  eg.addColorStop(0,`rgba(56,189,248,${0.68*pulse})`);
  eg.addColorStop(0.5,`rgba(14,165,233,${0.3*pulse})`);
  eg.addColorStop(1,'rgba(14,165,233,0)');
  ctx.fillStyle=eg; ctx.shadowBlur=5;
  ctx.beginPath(); ctx.ellipse(-len*0.43,0,wid*0.82,wid*0.72,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(14,165,233,0.72)';
  for(const sign of [-1,1]){
    ctx.beginPath();
    ctx.moveTo(-len*0.2,sign*wid*0.6); ctx.lineTo(-len*0.43,sign*wid*1.5);
    ctx.lineTo(-len*0.06,sign*wid*0.55); ctx.closePath(); ctx.fill();
  }
  if(shot.targetId){
    ctx.beginPath(); ctx.arc(0,0,wid*1.35,0,Math.PI*2);
    ctx.strokeStyle=`rgba(253,224,71,${0.32+pulse*0.22})`; ctx.lineWidth=0.55;
    ctx.setLineDash([3,4]); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawImpacts() {
  impacts.forEach(imp => {
    if(imp.delay && imp.delay > 0) return;
    const a = imp.life/imp.maxLife;
    const r = imp.maxR*(1-a);
    ctx.save(); ctx.globalCompositeOperation='screen';
    ctx.beginPath(); ctx.arc(imp.x,imp.y,Math.max(0,r),0,Math.PI*2);
    ctx.strokeStyle=imp.color==='#ffffff'?`rgba(255,255,255,${a*0.5})`:`rgba(125,249,255,${a*0.62})`;
    ctx.lineWidth=2.8*a; ctx.stroke();
    if(r>8){
      ctx.beginPath(); ctx.arc(imp.x,imp.y,Math.max(0,r*0.52),0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,255,255,${a*0.38})`; ctx.lineWidth=1.4*a; ctx.stroke();
    }
    if(a>0.6){
      ctx.beginPath(); ctx.arc(imp.x,imp.y,Math.max(0,r*0.18),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${(a-0.6)*2*0.8})`; ctx.fill();
    }
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    const a=p.life/p.maxLife;
    if(p.type==='bubble'){
      ctx.save(); ctx.globalCompositeOperation='screen';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(0.35+a*0.65),0,Math.PI*2);
      ctx.strokeStyle=`rgba(186,230,253,${a*0.5})`; ctx.lineWidth=0.65; ctx.stroke();
      ctx.fillStyle=`rgba(224,242,254,${a*0.1})`; ctx.fill();
      ctx.restore();
    } else if(p.type==='spark'){
      ctx.save(); ctx.globalCompositeOperation='screen';
      let r,g,b;
      if(p.color==='#ffffff'){r=255;g=255;b=255;}
      else if(p.color==='#7dd3fc'){r=125;g=211;b=252;}
      else {r=248;g=113;b=113;}
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a*0.88})`; ctx.fill();
      ctx.restore();
    } else if(p.type==='launch_ring'){
      const r2=p.maxR*(1-a);
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0,r2),0,Math.PI*2);
      ctx.strokeStyle=`rgba(125,249,255,${a*0.45})`; ctx.lineWidth=1.8*a; ctx.stroke();
    } else if(p.type==='debris'){
      ctx.save(); ctx.globalCompositeOperation='screen';
      ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.fillStyle=`rgba(180,60,60,${a*0.85})`;
      ctx.beginPath(); ctx.rect(-p.r*0.5,-p.r*0.25,p.r,p.r*0.5);
      ctx.fill(); ctx.restore();
    }
  });
}

function update(dt, now) {
  player.cooldown = Math.max(0, player.cooldown - dt);

  const nearbyTarget = closestTarget(mouseX, mouseY, 110);
  if(nearbyTarget) {
    if(lockTarget && lockTarget.id === nearbyTarget.id) {
      lockProgress = Math.min(1, (now - lockStartTime) / LOCK_DURATION);
    } else {
      lockTarget = nearbyTarget;
      lockStartTime = now;
      lockProgress = 0;
    }
    document.getElementById('lockState').textContent =
      lockProgress >= 1 ? '🔒 LOCK' : `${Math.round(lockProgress*100)}%`;
  } else {
    lockTarget = null; lockProgress = 0;
    document.getElementById('lockState').textContent = '—';
  }

  targets.forEach(t => {
    t.x += t.vx; t.y += t.vy;
    t.angle = t.baseAngle + Math.sin(now*0.001+t.id)*0.5;
    t.flashTimer = Math.max(0, t.flashTimer - dt*0.065);
    if(t.x < 200 || t.x > W-15) t.vx *= -1;
    if(t.y < 15 || t.y > H-15) t.vy *= -1;
  });

  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i]; s.life--;
    if(s.targetId && s.guideStrength>0){
      const tgt=targets.find(t=>t.id===s.targetId);
      if(tgt){
        let diff=Math.atan2(tgt.y-s.y,tgt.x-s.x)-s.angle;
        while(diff>Math.PI)diff-=Math.PI*2;
        while(diff<-Math.PI)diff+=Math.PI*2;
        s.angle+=diff*s.guideStrength;
        s.vx=Math.cos(s.angle)*s.speed; s.vy=Math.sin(s.angle)*s.speed;
      }
    }
    s.wobbleVel+=(Math.random()-0.5)*0.002; s.wobbleVel*=0.92;
    s.wobble+=s.wobbleVel; s.angle+=s.wobble*0.01;
    s.x+=s.vx; s.y+=s.vy;
    s.trail.push({x:s.x,y:s.y}); if(s.trail.length>24)s.trail.shift();
    let hit=false;
    for(let j=targets.length-1;j>=0;j--){
      const t=targets[j];
      if(Math.hypot(s.x-t.x,s.y-t.y)<t.radius+s.radius){
        t.hp-=s.damage; t.flashTimer=24;
        const isKill=t.hp<=0;
        spawnImpact(s.x,s.y,'#7dd3fc',false);
        if(isKill){
          spawnImpact(t.x,t.y,'#f87171',true);
          if(lockTarget&&lockTarget.id===t.id){lockTarget=null;lockProgress=0;}
          targets.splice(j,1);
          killCount++;
          document.getElementById('kills').textContent=killCount;
          setTimeout(spawnTarget,1800);
        }
        hitCount++;
        document.getElementById('hits').textContent=hitCount;
        shots.splice(i,1); hit=true; break;
      }
    }
    if(!hit&&(s.life<=0||s.x<-60||s.x>W+60||s.y<-60||s.y>H+60))shots.splice(i,1);
  }

  for(let i=impacts.length-1;i>=0;i--){
    const imp=impacts[i];
    if(imp.delay&&imp.delay>0){imp.delay-=dt;continue;}
    imp.life-=(dt/16);
    if(imp.life<=0)impacts.splice(i,1);
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=(dt/16);
    if(p.vx!==undefined){p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;}
    if(p.type==='debris'){p.angle+=p.rotVel;}
    if(p.life<=0)particles.splice(i,1);
  }
}

let last=0, fFrames=0, fTime=performance.now();
function loop(ts){
  const dt=ts-last; last=ts;
  update(Math.min(dt,32), ts);
  drawBg(ts); 
  targets.forEach(t=>{ drawReticle(t,ts); drawTarget(t,ts); });
  shots.forEach(s=>{ drawGuidanceLine(s,ts); drawWake(s,ts); drawTrail(s); drawTorpedo(s,ts); });
  drawPlayer(ts); drawImpacts(); drawParticles();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
