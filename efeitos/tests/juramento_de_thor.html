<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Especial - Juramento de Thor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030308;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            padding: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .hud-top h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #d4f0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-top p {
            margin: 5px 0 0 0;
            font-size: 1.2rem;
            color: #aaa;
        }

        #damage-log-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 350px;
            max-height: 400px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }

        .damage-entry {
            margin: 4px 0;
            font-size: 14px;
            animation: fadeIn 0.3s ease-out;
            border-left: 3px solid transparent;
            padding-left: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .dmg-tornado { color: #88ccff; border-color: #88ccff; }
        .dmg-raio { color: #ffee88; border-color: #ffee88; text-shadow: 0 0 5px #ffee88; font-weight: bold; }
        .dmg-tornado-maior { color: #ff5555; border-color: #ff5555; text-shadow: 0 0 8px #ff0000; font-weight: bold; font-size: 16px;}

        #flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        #player-zone {
            position: absolute;
            left: 0; top: 0;
            width: 50%; height: 100%;
            border-right: 2px dashed rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 2rem;
        }
        
        #enemy-zone {
            position: absolute;
            right: 0; top: 0;
            width: 50%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,0,0,0.1);
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <div id="flash"></div>
    
    <div id="player-zone">Nave do Jogador (Segura)</div>
    <div id="enemy-zone">Área Inimiga (Alvo)</div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud-top">
            <h1>Juramento de Thor</h1>
            <p id="status-text">Clique em qualquer lugar para disparar o especial.</p>
        </div>
        <div id="damage-log-container">
            <!-- Logs will appear here -->
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flashDiv = document.getElementById('flash');
        const statusText = document.getElementById('status-text');
        const logContainer = document.getElementById('damage-log-container');

        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Constants and State
        const BASE_WEAPON_DAMAGE = 100;
        let state = 'IDLE'; // IDLE, STAGE1, STAGE2
        let stageTimer = 0;
        let lastTime = 0;
        let tornados = [];
        let lightnings = [];
        let nextLightning = 0;

        function logDamage(type, name, multiplier) {
            const dmg = BASE_WEAPON_DAMAGE * multiplier;
            const el = document.createElement('div');
            el.className = `damage-entry ${type}`;
            el.textContent = `[${(stageTimer).toFixed(1)}s] ${name} causou ${dmg} de dano!`;
            logContainer.prepend(el);
            
            // Limit log entries
            if (logContainer.children.length > 25) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        function doFlash() {
            flashDiv.style.transition = 'none';
            flashDiv.style.opacity = '0.8';
            setTimeout(() => {
                flashDiv.style.transition = 'opacity 0.5s ease-out';
                flashDiv.style.opacity = '0';
            }, 50);
        }

        class Lightning {
            constructor() {
                this.life = 0.4;
                this.maxLife = 0.4;
                this.segments = [];
                this.branches = [];
                
                // Lightnings mainly target the right side
                let startX = W/2 + Math.random() * (W/2);
                let startY = 0;
                this.segments.push({x: startX, y: startY});
                
                while(startY < H) {
                    startX += (Math.random() - 0.5) * 150;
                    startY += 30 + Math.random() * 60;
                    this.segments.push({x: startX, y: startY});
                    
                    // Add small branches
                    if (Math.random() < 0.3) {
                        this.branches.push({
                            startX: startX,
                            startY: startY,
                            endX: startX + (Math.random() - 0.5) * 100,
                            endY: startY + 50 + Math.random() * 50
                        });
                    }
                }
            }

            update(dt) {
                this.life -= dt;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                const alpha = this.life / this.maxLife;
                
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#aaccff';
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.lineWidth = 4 * alpha;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // Main trunk
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x, this.segments[0].y);
                for(let i=1; i<this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x, this.segments[i].y);
                }
                ctx.stroke();

                // Branches
                ctx.lineWidth = 2 * alpha;
                this.branches.forEach(b => {
                    ctx.beginPath();
                    ctx.moveTo(b.startX, b.startY);
                    ctx.lineTo(b.endX, b.endY);
                    ctx.stroke();
                });

                ctx.restore();
            }
        }

        class Tornado {
            constructor(isBig) {
                this.isBig = isBig;
                this.radius = isBig ? 120 : 50;
                // Start on the right side
                this.x = W/2 + this.radius + Math.random() * (W/2 - this.radius*2);
                this.y = H/2 + (Math.random() - 0.5) * 200;
                
                this.vx = (Math.random() - 0.5) * 400;
                this.vy = (Math.random() - 0.5) * 400;
                
                this.tickTimer = 0;
                this.particles = [];
                
                const pCount = isBig ? 400 : 150;
                for(let i=0; i<pCount; i++) {
                    this.particles.push({
                        angle: Math.random() * Math.PI * 2,
                        h: Math.random(), // 0 to 1 (bottom to top)
                        speed: 3 + Math.random() * 4 + (isBig ? 2 : 0),
                        radiusOffset: Math.random() * 0.5 + 0.5,
                        size: Math.random() * (isBig ? 4 : 2) + 1
                    });
                }
            }

            update(dt) {
                // Erratic movement changes
                if (Math.random() < 0.1) {
                    this.vx += (Math.random() - 0.5) * 800;
                    this.vy += (Math.random() - 0.5) * 800;
                }

                // Drag
                this.vx *= 0.96;
                this.vy *= 0.96;

                // Move
                this.x += this.vx * dt;
                this.y += this.vy * dt;

                // Boundaries: Only right half of the screen
                const minX = W/2 + this.radius;
                const maxX = W - this.radius;
                const minY = this.radius*3;
                const maxY = H - 50;

                if (this.x < minX) { this.x = minX; this.vx = Math.abs(this.vx) * 1.5; }
                if (this.x > maxX) { this.x = maxX; this.vx = -Math.abs(this.vx) * 1.5; }
                if (this.y < minY) { this.y = minY; this.vy = Math.abs(this.vy) * 1.5; }
                if (this.y > maxY) { this.y = maxY; this.vy = -Math.abs(this.vy) * 1.5; }

                // Damage tick (2x por segundo = cada 0.5s)
                this.tickTimer += dt;
                if (this.tickTimer >= 0.5) {
                    this.tickTimer -= 0.5;
                    if (this.isBig) {
                        logDamage('dmg-tornado-maior', 'Tornado Maior', 3);
                    } else {
                        logDamage('dmg-tornado', 'Tornado Menor', 2);
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                const colorBase = this.isBig ? 'rgba(30, 40, 50,' : 'rgba(80, 120, 160,';
                const pColor = this.isBig ? 'rgba(100, 150, 200,' : 'rgba(180, 220, 255,';

                // Sort particles by Y so front renders over back
                // For a 3D effect, we split them based on sin(angle)
                this.particles.forEach(p => {
                    p.angle += p.speed * 0.016; // constant rot
                });

                this.particles.sort((a, b) => Math.sin(a.angle) - Math.sin(b.angle));

                this.particles.forEach(p => {
                    // Radius grows as h goes from 0 (bottom) to 1 (top)
                    const currentRadius = (this.radius * 0.2) + (this.radius * 0.8 * p.h) * p.radiusOffset;
                    const px = Math.cos(p.angle) * currentRadius;
                    
                    // Height mapping
                    const py = - (this.radius * 3 * p.h) + (Math.sin(p.angle) * currentRadius * 0.2);

                    const alpha = 0.2 + 0.8 * p.h; // fade at bottom
                    ctx.fillStyle = `${pColor} ${alpha})`;
                    
                    // Darker if in the back
                    if (Math.sin(p.angle) < 0) {
                        ctx.fillStyle = `${colorBase} ${alpha * 0.5})`;
                    }

                    ctx.beginPath();
                    ctx.arc(px, py, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.restore();
            }
        }

        function triggerSpecial() {
            if (state !== 'IDLE') return;
            
            state = 'STAGE1';
            stageTimer = 0;
            logContainer.innerHTML = '';
            statusText.innerHTML = '<span style="color:#ffee88">Estágio 1:</span> Tempestade e Tornados Menores (4s)';
            
            tornados = [];
            for(let i=0; i<3; i++) {
                tornados.push(new Tornado(false));
            }
            
            // First lightning starts soon
            nextLightning = 0.5 + Math.random() * 0.5;
            
            doFlash();
        }

        function update(dt) {
            if (state === 'IDLE') return;

            stageTimer += dt;

            // Spawn Lightning
            nextLightning -= dt;
            if (nextLightning <= 0) {
                lightnings.push(new Lightning());
                doFlash();
                logDamage('dmg-raio', 'Raio da Tempestade', 2);
                
                // Determine next interval (0.5 to 1.0)
                let interval = 0.5 + Math.random() * 0.5;
                if (state === 'STAGE2') {
                    // "gerando ainda mais raios" => smaller interval
                    interval = 0.3 + Math.random() * 0.4;
                }
                nextLightning = interval;
            }

            if (state === 'STAGE1' && stageTimer >= 4.0) {
                // Transition to stage 2
                state = 'STAGE2';
                stageTimer = 0;
                statusText.innerHTML = '<span style="color:#ff5555">Estágio 2:</span> O Grande Tornado (4s)';
                
                // Clear small tornados
                tornados = [];
                // Spawn Big Tornado
                tornados.push(new Tornado(true));
                doFlash();
            } 
            else if (state === 'STAGE2' && stageTimer >= 4.0) {
                // End
                state = 'IDLE';
                tornados = [];
                statusText.innerHTML = 'Especial Concluído. Clique para testar novamente.';
            }

            // Update entities
            tornados.forEach(t => t.update(dt));
            
            for(let i = lightnings.length - 1; i >= 0; i--) {
                lightnings[i].update(dt);
                if (lightnings[i].life <= 0) {
                    lightnings.splice(i, 1);
                }
            }
        }

        function draw() {
            // Darken background with a trail effect
            ctx.fillStyle = 'rgba(3, 3, 8, 0.4)';
            ctx.fillRect(0, 0, W, H);

            // Draw ambient storm clouds (simple gradient/rects)
            if (state !== 'IDLE') {
                ctx.fillStyle = `rgba(20, 30, 50, ${0.05 + Math.random()*0.05})`;
                ctx.fillRect(0, 0, W, H);
            }

            // Draw lightnings in background
            lightnings.forEach(l => l.draw(ctx));

            // Draw Tornados
            tornados.forEach(t => t.draw(ctx));
        }

        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        document.body.addEventListener('click', triggerSpecial);
        requestAnimationFrame(loop);

    </script>
</body>
</html>
