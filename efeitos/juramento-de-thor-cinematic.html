<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juramento de Thor - Cinematic Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020617;
      --panel-bg: rgba(5, 8, 18, 0.80);
      --border-color: rgba(125, 211, 252, 0.28);
      --storm-blue: #38bdf8;
      --storm-cyan: #67e8f9;
      --storm-gold: #fde68a;
      --storm-violet: #a78bfa;
      --text-color: #f8fafc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 78% 18%, rgba(125, 211, 252, 0.14), transparent 34%),
        radial-gradient(circle at 42% 76%, rgba(167, 139, 250, 0.1), transparent 32%),
        linear-gradient(180deg, #030712 0%, #020617 45%, #050816 100%);
      color: var(--text-color);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.035) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
    }

    .container {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 44px;
    }

    .header-nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 18px;
    }

    .subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--storm-cyan);
      text-shadow: 0 0 14px rgba(103, 232, 249, 0.48);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 4.25rem);
      font-weight: 900;
      line-height: 0.96;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 0 18px rgba(56, 189, 248, 0.34), 0 0 42px rgba(167, 139, 250, 0.22);
    }

    .back-btn {
      flex: 0 0 auto;
      color: var(--storm-cyan);
      border: 1px solid rgba(103, 232, 249, 0.34);
      background-color: rgba(8, 13, 28, 0.78);
      text-decoration: none;
      padding: 11px 16px;
      border-radius: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: inset 0 0 18px rgba(103, 232, 249, 0.07), 0 0 18px rgba(56, 189, 248, 0.08);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      border-color: var(--storm-gold);
      box-shadow: inset 0 0 18px rgba(253, 230, 138, 0.08), 0 0 22px rgba(253, 230, 138, 0.18);
      color: var(--storm-gold);
    }

    .simulator-wrapper {
      position: relative;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: #000;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.56), 0 0 46px rgba(56, 189, 248, 0.11), inset 0 0 50px rgba(56, 189, 248, 0.08);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      cursor: crosshair;
    }

    .simulator-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.06), transparent 16%, transparent 82%, rgba(2,6,23,0.28)),
        radial-gradient(circle at 82% 50%, rgba(103, 232, 249, 0.14), transparent 42%);
      mix-blend-mode: screen;
    }

    .control-panel {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: stretch;
      background: var(--panel-bg);
      border: 1px solid rgba(125, 211, 252, 0.22);
      border-radius: 8px;
      padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 16px 42px rgba(0,0,0,0.26);
    }

    .instructions {
      color: #cbd5e1;
      font-size: 1.04rem;
      line-height: 1.42;
    }

    .instructions strong {
      color: var(--storm-gold);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .control-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn-thor {
      border: 1px solid rgba(253, 230, 138, 0.48);
      background: linear-gradient(180deg, rgba(253, 230, 138, 0.22), rgba(56, 189, 248, 0.1)), rgba(8, 13, 28, 0.92);
      color: #fff7ed;
      border-radius: 6px;
      padding: 13px 18px;
      min-height: 46px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -12px 24px rgba(15, 23, 42, 0.56), 0 0 22px rgba(253, 230, 138, 0.14);
      transition: transform 0.1s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .btn-thor:hover {
      border-color: var(--storm-gold);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.26), inset 0 -12px 24px rgba(15, 23, 42, 0.48), 0 0 28px rgba(253, 230, 138, 0.25);
    }

    .btn-thor:active { transform: translateY(1px); }

    .audio-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #dbeafe;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .audio-toggle input { display: none; }

    .checkbox-box {
      width: 18px;
      height: 18px;
      border: 1px solid rgba(103, 232, 249, 0.46);
      border-radius: 4px;
      background-color: #020617;
      box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.12);
    }

    .audio-toggle input:checked + .checkbox-box {
      background-color: var(--storm-gold);
      border-color: var(--storm-gold);
      box-shadow: 0 0 16px rgba(253, 230, 138, 0.46);
    }

    @media (max-width: 760px) {
      .header-nav, .control-panel { grid-template-columns: 1fr; display: grid; }
      .header-nav { align-items: start; }
      .control-actions { justify-content: stretch; }
      .btn-thor, .audio-toggle { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-nav">
      <div class="title-block">
        <div class="subtitle">Horizon Special Test Module</div>
        <h1>Juramento de Thor</h1>
      </div>
      <a href="index.html" class="back-btn">Voltar ao QCH</a>
    </div>

    <div class="simulator-wrapper">
      <canvas id="thorCanvas" width="960" height="540"></canvas>
    </div>

    <div class="control-panel">
      <div class="instructions">
        <strong>Sequência Cinematográfica:</strong> pré-tempestade, coluna celestial, 3 tornados iniciais, mega tornado divino, raios globais, ondas de choque, detritos, trovões, dano e final com super raio.
      </div>
      <div class="control-actions">
        <label class="audio-toggle">
          <input type="checkbox" id="audioCheckbox" checked>
          <span class="checkbox-box"></span>
          Audio Sintetico
        </label>
        <button class="btn-thor" id="triggerBtn">Invocar [F]</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('thorCanvas');
    const ctx = canvas.getContext('2d');
    const triggerBtn = document.getElementById('triggerBtn');
    const audioCheckbox = document.getElementById('audioCheckbox');

    const WIDTH = 960;
    const HEIGHT = 540;
    const WEAPON_DAMAGE = 100;
    const keys = {};

    const player = { x: 118, y: HEIGHT / 2, width: 84, height: 50 };
    const targets = [];
    const particles = [];
    const sparks = [];
    const debris = [];
    const lightningBolts = [];
    const floatingTexts = [];
    const shockwaves = [];
    const divineRings = [];
    const clouds = [];
    const farBolts = [];

    let lastFrame = performance.now();
    let screenShake = 0;
    let flashAlpha = 0;
    let flashColor = 'rgba(219, 234, 254, 1)';
    let totalDamage = 0;
    let audioCtx = null;
    let cameraZoom = 1;
    let globalLight = 0;

    const storm = {
      active: false,
      start: 0,
      phase: 'idle',
      phaseStart: 0,
      nextLightning: 0,
      nextFarLightning: 0,
      tickAccSmall: 0,
      tickAccBig: 0,
      smallTornados: [],
      bigTornado: null,
      ended: false,
      finalBoltDone: false,
      celestialColumn: 0,
      darkness: 0
    };

    function rand(min, max) { return min + Math.random() * (max - min); }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

    for (let i = 0; i < 36; i++) {
      clouds.push({
        x: Math.random() * WIDTH,
        y: 8 + Math.random() * 160,
        width: 120 + Math.random() * 260,
        height: 34 + Math.random() * 38,
        speed: 3 + Math.random() * 11,
        alpha: 0.05 + Math.random() * 0.12,
        swirl: Math.random() * Math.PI * 2
      });
    }

    function getAudioContext() {
      if (!audioCheckbox.checked) return null;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playThunder(strength = 1) {
      const actx = getAudioContext();
      if (!actx) return;

      const osc = actx.createOscillator();
      const gain = actx.createGain();
      const filter = actx.createBiquadFilter();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(90 * strength, actx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(18, actx.currentTime + 0.95);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(310, actx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(42, actx.currentTime + 1.05);
      gain.gain.setValueAtTime(0.18 * strength, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 1.05);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(actx.destination);
      osc.start();
      osc.stop(actx.currentTime + 1.08);

      const bufferSize = Math.floor(actx.sampleRate * 0.92);
      const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        const t = i / bufferSize;
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.1);
      }
      const noise = actx.createBufferSource();
      const noiseGain = actx.createGain();
      const noiseFilter = actx.createBiquadFilter();
      noise.buffer = buffer;
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.setValueAtTime(650, actx.currentTime);
      noiseFilter.frequency.exponentialRampToValueAtTime(58, actx.currentTime + 0.92);
      noiseGain.gain.setValueAtTime(0.32 * strength, actx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.92);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(actx.destination);
      noise.start();
      noise.stop(actx.currentTime + 0.94);
    }

    function playVortexHum(strength = 1) {
      const actx = getAudioContext();
      if (!actx) return;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      const filter = actx.createBiquadFilter();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(62, actx.currentTime);
      osc.frequency.linearRampToValueAtTime(31, actx.currentTime + 0.8);
      filter.type = 'lowpass';
      filter.frequency.value = 360;
      gain.gain.setValueAtTime(0.15 * strength, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 1.1);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(actx.destination);
      osc.start();
      osc.stop(actx.currentTime + 1.12);
    }

    function playImpact(strength = 1) {
      const actx = getAudioContext();
      if (!actx) return;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(44 * strength, actx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(13, actx.currentTime + 0.35);
      gain.gain.setValueAtTime(0.22 * strength, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.42);
      osc.connect(gain);
      gain.connect(actx.destination);
      osc.start();
      osc.stop(actx.currentTime + 0.43);
    }

    function spawnDrone(x, y, hp = 1200) {
      targets.push({
        id: Math.random().toString(36).slice(2),
        x: x || 660 + Math.random() * 230,
        y: y || 110 + Math.random() * 320,
        radius: 18 + Math.random() * 5,
        hp,
        maxHp: hp,
        pulseOffset: Math.random() * Math.PI * 2,
        drift: Math.random() * Math.PI * 2,
        hitFlash: 0
      });
    }

    for (let i = 0; i < 7; i++) spawnDrone();

    function clampRightHalf(tornado, margin = 36) {
      const minX = WIDTH * 0.52 + tornado.radius * 0.25;
      const maxX = WIDTH - margin - tornado.radius * 0.12;
      const minY = 74;
      const maxY = HEIGHT - 42;
      tornado.x = clamp(tornado.x, minX, maxX);
      tornado.y = clamp(tornado.y, minY, maxY);
    }

    function createSmallTornado(index) {
      const lanes = [0.24, 0.52, 0.78];
      return {
        kind: 'small', index,
        x: WIDTH * (0.58 + index * 0.11),
        y: HEIGHT * lanes[index],
        vx: rand(-75, 100), vy: rand(-110, 110),
        radius: 58, height: 208,
        spin: Math.random() * Math.PI * 2,
        seed: Math.random() * 1000,
        alive: true, age: 0, lastDirShift: 0,
        birthScale: 0
      };
    }

    function createBigTornado(now) {
      return {
        kind: 'big', index: 9,
        x: WIDTH * 0.76, y: HEIGHT * 0.5,
        vx: 70, vy: -92,
        radius: 142, height: 424,
        spin: 0, seed: 777,
        alive: true, age: 0, born: now, lastDirShift: 0,
        birthScale: 0
      };
    }

    function triggerThor() {
      const now = performance.now();
      storm.active = true;
      storm.start = now;
      storm.phase = 'prelude';
      storm.phaseStart = now;
      storm.nextLightning = now + 1600;
      storm.nextFarLightning = now + 260;
      storm.tickAccSmall = 0;
      storm.tickAccBig = 0;
      storm.smallTornados = [];
      storm.bigTornado = null;
      storm.ended = false;
      storm.finalBoltDone = false;
      storm.celestialColumn = 0;
      storm.darkness = 0;
      lightningBolts.length = 0;
      floatingTexts.length = 0;
      shockwaves.length = 0;
      divineRings.length = 0;
      farBolts.length = 0;
      totalDamage = 0;
      screenShake = 8;
      flashAlpha = 0.14;
      flashColor = 'rgba(191, 219, 254, 1)';
      playVortexHum(0.85);
    }

    triggerBtn.addEventListener('click', triggerThor);
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'KeyF') triggerThor();
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * WIDTH;
      const y = ((e.clientY - rect.top) / rect.height) * HEIGHT;
      if (x > WIDTH * 0.48) spawnDrone(x, y, 1200);
    });

    function targetInVortex(target, tornado) {
      const dx = target.x - tornado.x;
      const dy = target.y - tornado.y;
      const rx = tornado.radius * (tornado.kind === 'big' ? 1.26 : 1.08);
      const ry = tornado.height * 0.46;
      return (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry) <= 1;
    }

    function applyDamage(amount, x, y, color, label) {
      const alive = targets.filter(t => t.hp > 0);
      if (!alive.length) return;
      let damaged = 0;
      for (const target of alive) {
        const dist = Math.hypot(target.x - x, target.y - y);
        const radius = label === 'RAIO' ? 160 : label === 'SUPER' ? 260 : 150;
        if (dist < radius) {
          target.hp = Math.max(0, target.hp - amount);
          target.hitFlash = 1;
          damaged++;
          floatingTexts.push({
            text: label === 'RAIO' ? `-${amount} RAIO` : label === 'SUPER' ? `-${amount} THOR` : `-${amount}`,
            x: target.x + rand(-14, 14), y: target.y - 30,
            vy: -0.75 - Math.random() * 0.6,
            life: 56, color
          });
          if (target.hp <= 0) burst(target.x, target.y, color, 34);
        }
      }
      if (damaged > 0) totalDamage += amount * damaged;
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const force = rand(1.5, 7.2);
        particles.push({ x, y, vx: Math.cos(angle) * force, vy: Math.sin(angle) * force, size: rand(1, 4.6), life: 1, decay: rand(0.016, 0.04), color });
      }
    }

    function spawnShockwave(x, y, color = 'rgba(253, 230, 138, 1)', maxRadius = 190) {
      shockwaves.push({ x, y, radius: 4, maxRadius, life: 1, color, width: rand(2, 5) });
    }

    function spawnDivineRing(x, y, radius, color) {
      divineRings.push({ x, y, radius, angle: Math.random() * Math.PI * 2, life: 1, color });
    }

    function spawnSuctionDebris(tornado, amount) {
      for (let i = 0; i < amount; i++) {
        const side = Math.random() < 0.5 ? -1 : 1;
        const startX = tornado.x + side * rand(tornado.radius * 1.15, tornado.radius * 2.3);
        const startY = tornado.y + rand(-tornado.height * 0.42, tornado.height * 0.44);
        debris.push({
          x: startX, y: startY,
          vx: rand(-1.1, 1.1), vy: rand(-2.2, 0.5),
          size: rand(2, tornado.kind === 'big' ? 9 : 6),
          rot: Math.random() * Math.PI * 2,
          vr: rand(-0.18, 0.18),
          life: 1,
          decay: rand(0.006, 0.018),
          target: tornado,
          color: Math.random() < 0.7 ? 'rgba(148, 163, 184, 0.75)' : 'rgba(253, 230, 138, 0.82)'
        });
      }
    }

    function branchLightning(x1, y1, x2, y2, depth = 0) {
      const points = [{ x: x1, y: y1 }];
      const segments = 10 + Math.floor(Math.random() * 7);
      for (let i = 1; i < segments; i++) {
        const p = i / segments;
        const baseX = x1 + (x2 - x1) * p;
        const baseY = y1 + (y2 - y1) * p;
        const jitter = (1 - Math.abs(0.5 - p)) * (52 - depth * 12);
        points.push({ x: baseX + rand(-jitter / 2, jitter / 2), y: baseY + rand(-jitter / 2, jitter / 2) });
      }
      points.push({ x: x2, y: y2 });
      const branches = [];
      if (depth < 2) {
        for (let i = 2; i < points.length - 2; i += 3) {
          if (Math.random() < (depth === 0 ? 0.7 : 0.38)) {
            const p = points[i];
            const side = Math.random() < 0.5 ? -1 : 1;
            branches.push(branchLightning(p.x, p.y, p.x + side * rand(30, 86), p.y + rand(25, 95), depth + 1));
          }
        }
      }
      return { points, branches };
    }

    function spawnLightning(now, empowered = false, superBolt = false) {
      const target = targets.filter(t => t.hp > 0).sort(() => Math.random() - 0.5)[0];
      const endX = target ? target.x + rand(-34, 34) : WIDTH * rand(0.58, 0.93);
      const endY = target ? target.y : rand(130, 450);
      const startX = clamp(endX + rand(-200, 200), WIDTH * 0.5, WIDTH - 24);
      const bolt = branchLightning(startX, -18, endX, endY, 0);
      lightningBolts.push({
        bolt,
        life: superBolt ? 28 : empowered ? 20 : 15,
        maxLife: superBolt ? 28 : empowered ? 20 : 15,
        width: superBolt ? 7.5 : empowered ? 4.7 : 3.2,
        color: superBolt ? '#ffffff' : empowered ? '#fde68a' : '#93c5fd'
      });
      applyDamage(superBolt ? WEAPON_DAMAGE * 8 : WEAPON_DAMAGE * 2, endX, endY, superBolt ? '#ffffff' : '#fde68a', superBolt ? 'SUPER' : 'RAIO');
      burst(endX, endY, superBolt ? '#ffffff' : '#fde68a', superBolt ? 62 : empowered ? 34 : 20);
      spawnShockwave(endX, endY, superBolt ? 'rgba(255,255,255,1)' : 'rgba(253, 230, 138, 1)', superBolt ? 330 : 210);
      screenShake = Math.max(screenShake, superBolt ? 34 : empowered ? 22 : 13);
      flashAlpha = Math.max(flashAlpha, superBolt ? 0.76 : empowered ? 0.50 : 0.33);
      flashColor = superBolt ? 'rgba(255,255,255,1)' : empowered ? 'rgba(253, 230, 138, 1)' : 'rgba(191, 219, 254, 1)';
      globalLight = Math.max(globalLight, superBolt ? 1 : 0.62);
      playThunder(superBolt ? 1.5 : empowered ? 1.12 : 0.82);
      playImpact(superBolt ? 1.35 : 0.75);
      storm.nextLightning = now + (empowered ? rand(360, 760) : rand(500, 1000));
    }

    function spawnFarLightning(now) {
      const x1 = rand(WIDTH * 0.42, WIDTH);
      const x2 = x1 + rand(-120, 120);
      const y2 = rand(80, 210);
      farBolts.push({ bolt: branchLightning(x1, 0, x2, y2, 0), life: 10, maxLife: 10 });
      flashAlpha = Math.max(flashAlpha, 0.06);
      storm.nextFarLightning = now + rand(380, 900);
    }

    function updateStorm(now, dt) {
      if (!storm.active) return;
      const phaseAge = now - storm.phaseStart;

      if (storm.phase === 'prelude') {
        const p = clamp(phaseAge / 1200, 0, 1);
        storm.darkness = easeInOut(p) * 0.64;
        storm.celestialColumn = clamp((phaseAge - 520) / 620, 0, 1);
        screenShake = Math.max(screenShake, 3 + p * 11);
        if (now >= storm.nextFarLightning) spawnFarLightning(now);
        if (phaseAge >= 1200) {
          storm.phase = 'small';
          storm.phaseStart = now;
          storm.smallTornados = [createSmallTornado(0), createSmallTornado(1), createSmallTornado(2)];
          storm.nextLightning = now + 220;
          screenShake = 18;
          flashAlpha = 0.46;
          flashColor = 'rgba(219, 234, 254, 1)';
          globalLight = 0.75;
          playThunder(1.08);
          playVortexHum(1.2);
          spawnDivineRing(WIDTH * 0.71, HEIGHT * 0.5, 54, 'rgba(103, 232, 249, 1)');
        }
      } else if (storm.phase === 'small' && phaseAge >= 4000) {
        storm.phase = 'big';
        storm.phaseStart = now;
        storm.smallTornados.forEach(t => t.alive = false);
        storm.bigTornado = createBigTornado(now);
        screenShake = 28;
        flashAlpha = 0.58;
        flashColor = 'rgba(253, 230, 138, 1)';
        globalLight = 0.9;
        playVortexHum(1.55);
        playThunder(1.25);
        spawnDivineRing(WIDTH * 0.76, HEIGHT * 0.5, 92, 'rgba(253, 230, 138, 1)');
      } else if (storm.phase === 'big' && phaseAge >= 4000) {
        storm.phase = 'ending';
        storm.phaseStart = now;
        if (storm.bigTornado) storm.bigTornado.alive = false;
        storm.ended = true;
      } else if (storm.phase === 'ending') {
        storm.darkness = Math.max(0, 0.5 * (1 - phaseAge / 1600));
        if (!storm.finalBoltDone && phaseAge > 220) {
          storm.finalBoltDone = true;
          spawnLightning(now, true, true);
        }
        if (phaseAge >= 1700) {
          storm.active = false;
          storm.phase = 'idle';
          storm.darkness = 0;
          storm.celestialColumn = 0;
        }
      }

      if ((storm.phase === 'small' || storm.phase === 'big') && now >= storm.nextLightning) {
        spawnLightning(now, storm.phase === 'big');
      }
      if (storm.active && now >= storm.nextFarLightning && Math.random() < 0.7) spawnFarLightning(now);

      const activeTornados = storm.phase === 'small'
        ? storm.smallTornados.filter(t => t.alive)
        : storm.bigTornado && storm.bigTornado.alive ? [storm.bigTornado] : [];

      for (const tornado of activeTornados) {
        tornado.age += dt;
        tornado.birthScale = clamp(tornado.birthScale + dt / 420, 0, 1);
        tornado.spin += dt * (tornado.kind === 'big' ? 0.0075 : 0.0095);
        tornado.lastDirShift += dt;

        if (tornado.kind === 'small') {
          if (tornado.lastDirShift > 260 + Math.random() * 240) {
            tornado.vx += rand(-125, 125);
            tornado.vy += rand(-160, 160);
            tornado.lastDirShift = 0;
          }
          tornado.vx += Math.sin(now / 210 + tornado.seed) * 4.8;
          tornado.vy += Math.cos(now / 170 + tornado.seed) * 5.6;
          tornado.vx *= 0.988;
          tornado.vy *= 0.986;
          tornado.x += tornado.vx * dt / 1000;
          tornado.y += tornado.vy * dt / 1000;
        } else {
          tornado.x = WIDTH * 0.75 + Math.sin(now / 760) * 94 + Math.sin(now / 260) * 26;
          tornado.y = HEIGHT * 0.5 + Math.sin(now / 520) * 138 + Math.cos(now / 310) * 24;
        }
        clampRightHalf(tornado, tornado.kind === 'big' ? 76 : 32);

        spawnSuctionDebris(tornado, tornado.kind === 'big' ? 2 : 1);
        const particleChance = tornado.kind === 'big' ? 0.98 : 0.72;
        if (Math.random() < particleChance) {
          const amount = tornado.kind === 'big' ? 4 : 2;
          for (let i = 0; i < amount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const rim = tornado.radius * rand(0.45, 1.24);
            particles.push({
              x: tornado.x + Math.cos(angle) * rim,
              y: tornado.y + rand(-tornado.height * 0.42, tornado.height * 0.42),
              vx: Math.cos(angle + Math.PI / 2) * rand(1, 3.2),
              vy: rand(-3.4, -0.8),
              size: rand(1, tornado.kind === 'big' ? 5.6 : 3.5),
              life: 0.78,
              decay: rand(0.012, 0.03),
              color: Math.random() < 0.58 ? 'rgba(186, 230, 253, 0.82)' : 'rgba(253, 230, 138, 0.82)'
            });
          }
        }

        if (tornado.kind === 'big' && Math.random() < 0.12) {
          const a = Math.random() * Math.PI * 2;
          sparks.push({
            x: tornado.x + Math.cos(a) * tornado.radius * rand(0.2, 1),
            y: tornado.y + rand(-tornado.height * 0.42, tornado.height * 0.3),
            vx: Math.cos(a) * rand(1, 4), vy: Math.sin(a) * rand(1, 4),
            life: 1, decay: rand(0.04, 0.08), color: 'rgba(253, 230, 138, 1)'
          });
        }
      }

      if (storm.phase === 'small') {
        storm.tickAccSmall += dt;
        while (storm.tickAccSmall >= 500) {
          storm.tickAccSmall -= 500;
          for (const tornado of storm.smallTornados.filter(t => t.alive)) {
            for (const target of targets.filter(t => t.hp > 0)) {
              if (targetInVortex(target, tornado)) {
                applyDamage(WEAPON_DAMAGE * 2, tornado.x, tornado.y, '#7dd3fc', 'TORNADO');
                spawnShockwave(tornado.x, tornado.y, 'rgba(125, 211, 252, 1)', 120);
                break;
              }
            }
          }
        }
      }

      if (storm.phase === 'big') {
        storm.tickAccBig += dt;
        while (storm.tickAccBig >= 500) {
          storm.tickAccBig -= 500;
          if (storm.bigTornado) {
            for (const target of targets.filter(t => t.hp > 0)) {
              if (targetInVortex(target, storm.bigTornado)) {
                applyDamage(WEAPON_DAMAGE * 3, storm.bigTornado.x, storm.bigTornado.y, '#fde68a', 'MEGA');
                spawnShockwave(storm.bigTornado.x, storm.bigTornado.y, 'rgba(253, 230, 138, 1)', 170);
                break;
              }
            }
          }
        }
      }
    }

    function updateWorld(now, dt) {
      const speed = 4.2;
      if (keys.KeyW || keys.ArrowUp) player.y -= speed;
      if (keys.KeyS || keys.ArrowDown) player.y += speed;
      player.y = clamp(player.y, 60, HEIGHT - 60);

      for (const target of targets) {
        target.drift += dt * 0.001;
        target.hitFlash *= 0.86;
        target.x += Math.sin(target.drift * 1.2 + target.pulseOffset) * 0.12;
        target.y += Math.cos(target.drift * 1.5 + target.pulseOffset) * 0.16;
        target.x = clamp(target.x, WIDTH * 0.52, WIDTH - 46);
        target.y = clamp(target.y, 70, HEIGHT - 46);
      }

      const stormWind = storm.active ? (storm.phase === 'prelude' ? 2.7 : storm.phase === 'big' ? 8.5 : 5.5) : 1;
      for (const cloud of clouds) {
        cloud.swirl += dt * 0.0006;
        cloud.x -= (cloud.speed + stormWind * 4) * dt / 1000;
        if (storm.active) {
          const cx = WIDTH * 0.72;
          cloud.y += Math.sin(now / 560 + cloud.swirl) * 0.1 * stormWind;
          cloud.x += (cx - cloud.x) * 0.0005 * stormWind;
        }
        if (cloud.x + cloud.width < -80) {
          cloud.x = WIDTH + Math.random() * 180;
          cloud.y = 8 + Math.random() * 160;
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.986; p.vy *= 0.986;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }

      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.x += s.vx; s.y += s.vy;
        s.vx *= 0.94; s.vy *= 0.94;
        s.life -= s.decay;
        if (s.life <= 0) sparks.splice(i, 1);
      }

      for (let i = debris.length - 1; i >= 0; i--) {
        const d = debris[i];
        if (d.target && d.target.alive) {
          const dx = d.target.x - d.x;
          const dy = d.target.y - d.y;
          const dist = Math.max(16, Math.hypot(dx, dy));
          const pull = d.target.kind === 'big' ? 0.28 : 0.18;
          d.vx += (dx / dist) * pull;
          d.vy += (dy / dist) * pull - 0.02;
        }
        d.x += d.vx; d.y += d.vy; d.rot += d.vr;
        d.vx *= 0.982; d.vy *= 0.982;
        d.life -= d.decay;
        if (d.life <= 0 || d.y < -80) debris.splice(i, 1);
      }

      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.radius += (sw.maxRadius - sw.radius) * 0.075 + 4.8;
        sw.life -= 0.035;
        if (sw.life <= 0 || sw.radius > sw.maxRadius) shockwaves.splice(i, 1);
      }

      for (let i = divineRings.length - 1; i >= 0; i--) {
        const r = divineRings[i];
        r.angle += 0.055;
        r.radius += 2.6;
        r.life -= 0.014;
        if (r.life <= 0) divineRings.splice(i, 1);
      }

      for (let i = lightningBolts.length - 1; i >= 0; i--) {
        lightningBolts[i].life--;
        if (lightningBolts[i].life <= 0) lightningBolts.splice(i, 1);
      }

      for (let i = farBolts.length - 1; i >= 0; i--) {
        farBolts[i].life--;
        if (farBolts[i].life <= 0) farBolts.splice(i, 1);
      }

      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y += ft.vy;
        ft.life--;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
      }

      targets.forEach(target => {
        if (target.hp <= 0 && Math.random() < 0.01) {
          target.x = WIDTH * rand(0.6, 0.94);
          target.y = rand(100, 430);
          target.hp = target.maxHp;
          target.hitFlash = 0;
        }
      });

      screenShake *= 0.9;
      flashAlpha *= 0.85;
      globalLight *= 0.88;
      cameraZoom += (1 - cameraZoom) * 0.08;
    }

    function drawBackground(now) {
      const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      sky.addColorStop(0, storm.active ? '#02030b' : '#050816');
      sky.addColorStop(0.35, storm.active ? '#070b18' : '#0b1020');
      sky.addColorStop(0.68, '#050716');
      sky.addColorStop(1, '#020617');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (const cloud of clouds) {
        const stormBoost = storm.active ? 1.8 : 1;
        const grad = ctx.createRadialGradient(cloud.x, cloud.y, 0, cloud.x, cloud.y, cloud.width * 0.62);
        grad.addColorStop(0, `rgba(148, 163, 184, ${cloud.alpha * stormBoost})`);
        grad.addColorStop(0.48, `rgba(56, 189, 248, ${cloud.alpha * 0.56 * stormBoost})`);
        grad.addColorStop(0.76, `rgba(15, 23, 42, ${cloud.alpha * 0.5})`);
        grad.addColorStop(1, 'rgba(15, 23, 42, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(cloud.x, cloud.y, cloud.width, cloud.height, Math.sin(cloud.swirl) * 0.08, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      if (storm.active) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const vortexX = WIDTH * 0.74;
        const vortexY = 86;
        for (let i = 0; i < 12; i++) {
          const r = 50 + i * 24 + Math.sin(now / 280 + i) * 8;
          ctx.strokeStyle = `rgba(103, 232, 249, ${0.08 - i * 0.004})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.ellipse(vortexX, vortexY, r * 1.6, r * 0.36, now / 900 + i * 0.4, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      ctx.strokeStyle = 'rgba(125, 211, 252, 0.04)';
      ctx.lineWidth = 1;
      for (let x = 0; x < WIDTH; x += 48) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x - 82, HEIGHT);
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(2, 6, 23, 0.42)';
      ctx.fillRect(0, HEIGHT - 34, WIDTH, 34);
      ctx.strokeStyle = 'rgba(125, 211, 252, 0.14)';
      ctx.beginPath();
      ctx.moveTo(WIDTH * 0.5, 0);
      ctx.lineTo(WIDTH * 0.5, HEIGHT);
      ctx.stroke();

      if (storm.darkness > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${storm.darkness})`;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
      }
    }

    function drawCelestialColumn(now) {
      const intensity = storm.phase === 'prelude' ? storm.celestialColumn : storm.phase === 'small' ? Math.max(0, 1 - (now - storm.phaseStart) / 1200) : storm.phase === 'big' ? 0.4 : 0;
      if (intensity <= 0.01) return;
      const x = WIDTH * 0.72;
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const grad = ctx.createLinearGradient(x, 0, x, HEIGHT);
      grad.addColorStop(0, `rgba(255,255,255,${0.48 * intensity})`);
      grad.addColorStop(0.2, `rgba(103,232,249,${0.28 * intensity})`);
      grad.addColorStop(0.72, `rgba(253,230,138,${0.16 * intensity})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x - 88 * intensity, 0);
      ctx.lineTo(x + 92 * intensity, 0);
      ctx.lineTo(x + 44 * intensity, HEIGHT);
      ctx.lineTo(x - 38 * intensity, HEIGHT);
      ctx.closePath();
      ctx.fill();

      const core = ctx.createLinearGradient(x, 0, x, HEIGHT);
      core.addColorStop(0, `rgba(255,255,255,${0.72 * intensity})`);
      core.addColorStop(0.6, `rgba(103,232,249,${0.2 * intensity})`);
      core.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = core;
      ctx.fillRect(x - 10 * intensity, 0, 20 * intensity, HEIGHT);
      ctx.restore();
    }

    function drawPlayer(now) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.shadowBlur = 22 + globalLight * 20;
      ctx.shadowColor = '#38bdf8';
      const body = ctx.createLinearGradient(-42, -24, 38, 22);
      body.addColorStop(0, '#0f172a');
      body.addColorStop(0.48, globalLight > 0.1 ? '#67e8f9' : '#38bdf8');
      body.addColorStop(1, '#f8fafc');
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(42, 0); ctx.lineTo(-34, -24); ctx.lineTo(-18, -5); ctx.lineTo(-42, 0); ctx.lineTo(-18, 5); ctx.lineTo(-34, 24);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.62)';
      ctx.lineWidth = 1.5; ctx.stroke();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(56, 189, 248, 0.5)';
      ctx.beginPath();
      ctx.ellipse(-44, 0, 20 + Math.sin(now / 80) * 3, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawTargets(now) {
      for (const target of targets) {
        if (target.hp <= 0) continue;
        const float = Math.sin(now / 170 + target.pulseOffset) * 5;
        ctx.save();
        ctx.translate(target.x, target.y + float);
        if (globalLight > 0.1) {
          ctx.fillStyle = `rgba(255,255,255,${globalLight * 0.13})`;
          ctx.beginPath();
          ctx.ellipse(18, 22, 34, 9, 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowBlur = 18 + target.hitFlash * 36;
        ctx.shadowColor = target.hitFlash > 0.1 ? '#fde68a' : '#93c5fd';
        ctx.fillStyle = target.hitFlash > 0.1 ? '#fef3c7' : '#172554';
        ctx.strokeStyle = target.hitFlash > 0.1 ? '#ffffff' : '#7dd3fc';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, target.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#020617'; ctx.fillRect(-28, -38, 56, 4);
        ctx.fillStyle = target.hp / target.maxHp < 0.35 ? '#f87171' : '#7dd3fc';
        ctx.fillRect(-28, -38, 56 * Math.max(0, target.hp / target.maxHp), 4);
        ctx.restore();
      }
    }

    function drawTornado(tornado, now) {
      const scale = easeOutCubic(tornado.birthScale || 1);
      const phase = tornado.spin;
      ctx.save();
      ctx.translate(tornado.x, tornado.y);
      ctx.scale(scale, scale);
      ctx.globalCompositeOperation = 'lighter';

      const glow = ctx.createRadialGradient(0, 0, tornado.radius * 0.1, 0, 0, tornado.radius * 1.75);
      glow.addColorStop(0, tornado.kind === 'big' ? 'rgba(253, 230, 138, 0.24)' : 'rgba(125, 211, 252, 0.16)');
      glow.addColorStop(0.48, 'rgba(56, 189, 248, 0.10)');
      glow.addColorStop(1, 'rgba(2, 6, 23, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.ellipse(0, 0, tornado.radius * 1.75, tornado.height * 0.58, 0, 0, Math.PI * 2);
      ctx.fill();

      if (tornado.kind === 'big') {
        const core = ctx.createRadialGradient(0, -40, 0, 0, -40, tornado.radius * 0.9);
        core.addColorStop(0, 'rgba(255,255,255,0.22)');
        core.addColorStop(0.4, 'rgba(253,230,138,0.18)');
        core.addColorStop(1, 'rgba(253,230,138,0)');
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.ellipse(0, -40, tornado.radius * 0.9, tornado.height * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      const layers = tornado.kind === 'big' ? 24 : 14;
      for (let i = 0; i < layers; i++) {
        const p = i / (layers - 1);
        const y = tornado.height * 0.48 - p * tornado.height;
        const width = tornado.radius * (0.24 + p * 1.1);
        const height = 8 + p * (tornado.kind === 'big' ? 24 : 14);
        const spin = phase + p * 9.5 + Math.sin(now / 150 + i) * 0.5;
        const x = Math.sin(spin) * width * 0.43;
        const alpha = 0.12 + p * (tornado.kind === 'big' ? 0.34 : 0.28);
        ctx.strokeStyle = tornado.kind === 'big' ? `rgba(253, 230, 138, ${alpha})` : `rgba(125, 211, 252, ${alpha})`;
        ctx.lineWidth = tornado.kind === 'big' ? 4.2 : 2.4;
        ctx.beginPath();
        ctx.ellipse(x, y, width, height, Math.sin(spin) * 0.2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = `rgba(226, 232, 240, ${alpha * 0.48})`;
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.arc(x * 0.82, y, width * 0.72, Math.PI * 0.1, Math.PI * 1.18);
        ctx.stroke();
      }

      for (let i = 0; i < (tornado.kind === 'big' ? 52 : 28); i++) {
        const p = (i / 26 + now / (tornado.kind === 'big' ? 760 : 720) + tornado.seed) % 1;
        const angle = phase * 1.8 + i * 1.9;
        const radius = tornado.radius * (0.22 + p * 1.08);
        const y = tornado.height * 0.48 - p * tornado.height;
        const x = Math.cos(angle + p * 7.4) * radius;
        ctx.fillStyle = i % 4 === 0 ? 'rgba(253, 230, 138, 0.92)' : 'rgba(186, 230, 253, 0.66)';
        ctx.beginPath(); ctx.arc(x, y, tornado.kind === 'big' ? 3.1 : 2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    function drawLightningSegment(boltData) {
      const { points, branches } = boltData;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();
      for (const branch of branches) drawLightningSegment(branch);
    }

    function drawLightning() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const bolt of farBolts) {
        const alpha = bolt.life / bolt.maxLife;
        ctx.shadowBlur = 16; ctx.shadowColor = '#93c5fd';
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = `rgba(147, 197, 253, ${0.38 * alpha})`;
        ctx.lineWidth = 1.7;
        drawLightningSegment(bolt.bolt);
      }
      for (const bolt of lightningBolts) {
        const alpha = bolt.life / bolt.maxLife;
        ctx.shadowBlur = 34; ctx.shadowColor = bolt.color;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.94 * alpha})`;
        ctx.lineWidth = bolt.width + 3.4;
        drawLightningSegment(bolt.bolt);
        ctx.strokeStyle = bolt.color === '#ffffff' ? `rgba(255,255,255,${0.9 * alpha})` : bolt.color.replace(')', `, ${0.84 * alpha})`).replace('rgb', 'rgba');
        ctx.lineWidth = bolt.width;
        drawLightningSegment(bolt.bolt);
        ctx.strokeStyle = `rgba(103, 232, 249, ${0.48 * alpha})`;
        ctx.lineWidth = 1.2;
        drawLightningSegment(bolt.bolt);
      }
      ctx.restore();
    }

    function drawShockwaves() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const sw of shockwaves) {
        ctx.globalAlpha = Math.max(0, sw.life);
        ctx.strokeStyle = sw.color.replace('1)', `${0.45 * sw.life})`);
        ctx.lineWidth = sw.width;
        ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = `rgba(255,255,255,${0.20 * sw.life})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius * 0.72, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    }

    function drawDivineRings() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const r of divineRings) {
        ctx.globalAlpha = r.life;
        ctx.strokeStyle = r.color.replace('1)', `${0.45 * r.life})`);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.radius * 1.6, r.radius * 0.46, r.angle, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = `rgba(255,255,255,${0.25 * r.life})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.radius * 1.2, r.radius * 0.34, -r.angle * 0.7, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawDebris() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const d of debris) {
        ctx.globalAlpha = Math.max(0, d.life);
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rot);
        ctx.fillStyle = d.color;
        ctx.fillRect(-d.size / 2, -d.size / 2, d.size, d.size * 0.62);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
      }
      ctx.restore();
    }

    function drawSparks() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const s of sparks) {
        ctx.globalAlpha = Math.max(0, s.life);
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.vx * 5, s.y - s.vy * 5);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 14;
        ctx.shadowColor = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    function drawHud(now) {
      const phaseLabel = storm.phase === 'prelude' ? 'O CÉU RESPONDE' : storm.phase === 'small' ? '3 TORNADOS INICIAIS' : storm.phase === 'big' ? 'MEGA TORNADO DIVINO' : storm.phase === 'ending' ? 'ÚLTIMO RAIO' : 'PRONTO';
      const elapsed = storm.active ? Math.min(10, (now - storm.start) / 1000) : 0;
      ctx.save();
      ctx.fillStyle = 'rgba(2, 6, 23, 0.64)';
      ctx.strokeStyle = 'rgba(125, 211, 252, 0.34)';
      ctx.lineWidth = 1;
      ctx.roundRect(18, 18, 330, 82, 8); ctx.fill(); ctx.stroke();
      ctx.font = '700 11px Orbitron'; ctx.fillStyle = '#fde68a'; ctx.fillText('JURAMENTO DE THOR', 34, 42);
      ctx.fillStyle = '#e2e8f0'; ctx.font = '700 16px Rajdhani'; ctx.fillText(phaseLabel, 34, 66);
      ctx.fillStyle = '#67e8f9'; ctx.fillRect(34, 78, 274 * (elapsed / 10), 6);
      ctx.strokeStyle = 'rgba(226, 232, 240, 0.18)'; ctx.strokeRect(34, 78, 274, 6);

      ctx.fillStyle = 'rgba(2, 6, 23, 0.64)'; ctx.strokeStyle = 'rgba(253, 230, 138, 0.3)';
      ctx.roundRect(WIDTH - 238, 18, 220, 82, 8); ctx.fill(); ctx.stroke();
      ctx.font = '700 11px Orbitron'; ctx.fillStyle = '#fde68a'; ctx.fillText('DANO SIMULADO', WIDTH - 220, 42);
      ctx.font = '700 22px Rajdhani'; ctx.fillStyle = '#ffffff'; ctx.fillText(totalDamage.toLocaleString('pt-BR'), WIDTH - 220, 70);
      ctx.font = '700 12px Rajdhani'; ctx.fillStyle = '#bae6fd'; ctx.fillText('Arma atual: 100', WIDTH - 220, 88);
      ctx.restore();
    }

    function drawFloatingTexts() {
      ctx.save();
      ctx.font = '900 14px Orbitron';
      ctx.textAlign = 'center';
      for (const ft of floatingTexts) {
        ctx.globalAlpha = Math.max(0, ft.life / 56);
        ctx.shadowBlur = 14; ctx.shadowColor = ft.color;
        ctx.fillStyle = ft.color;
        ctx.fillText(ft.text, ft.x, ft.y);
      }
      ctx.restore();
    }

    function drawPostProcess() {
      ctx.save();
      if (flashAlpha > 0.01) {
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = flashColor.replace('1)', `${flashAlpha})`);
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
      }
      const vignette = ctx.createRadialGradient(WIDTH * 0.5, HEIGHT * 0.5, HEIGHT * 0.22, WIDTH * 0.5, HEIGHT * 0.5, WIDTH * 0.74);
      vignette.addColorStop(0, 'rgba(0,0,0,0)');
      vignette.addColorStop(0.72, 'rgba(0,0,0,0.14)');
      vignette.addColorStop(1, 'rgba(0,0,0,0.58)');
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      ctx.restore();
    }

    function draw(now) {
      ctx.save();
      if (screenShake > 0.2) ctx.translate(rand(-0.5, 0.5) * screenShake, rand(-0.5, 0.5) * screenShake);
      if (cameraZoom !== 1) {
        ctx.translate(WIDTH / 2, HEIGHT / 2);
        ctx.scale(cameraZoom, cameraZoom);
        ctx.translate(-WIDTH / 2, -HEIGHT / 2);
      }

      drawBackground(now);
      drawCelestialColumn(now);
      drawTargets(now);
      drawShockwaves();
      drawDivineRings();

      if (storm.phase === 'small') storm.smallTornados.filter(t => t.alive).forEach(t => drawTornado(t, now));
      if (storm.phase === 'big' && storm.bigTornado) drawTornado(storm.bigTornado, now);

      drawDebris();
      drawParticles();
      drawSparks();
      drawLightning();
      drawPlayer(now);
      drawFloatingTexts();
      drawHud(now);
      drawPostProcess();
      ctx.restore();
    }

    function loop(now) {
      const dt = Math.min(40, now - lastFrame);
      lastFrame = now;
      updateStorm(now, dt);
      updateWorld(now, dt);
      draw(now);
      requestAnimationFrame(loop);
    }

    triggerThor();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
